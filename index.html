// ===== UTILS =====
function fmt(n){return Number(n||0).toLocaleString("ja-JP");}
function ts(ms){const s=Math.max(0,Math.floor(ms/1000));return[Math.floor(s/3600),Math.floor((s%3600)/60),s%60].map(x=>String(x).padStart(2,"0")).join(":");}
function ct(ses){
  if(!ses)return{subtotal:0,discount:0,tax:0,total:0,rate:.25};
  const r=ses.items.some(i=>i.isVipCharge)?.30:.25;
  const sub=ses.items.filter(i=>!i.isDiscount).reduce((a,i)=>a+i.price*(i.qty||1),0);
  const discAmt=ses.items.filter(i=>i.isDiscount).reduce((a,i)=>a+Math.abs(i.price*(i.qty||1)),0);
  const afterDisc=Math.max(0,sub-discAmt);
  const tax=Math.floor(afterDisc*r);
  return{subtotal:sub,discount:discAmt,tax,total:afterDisc+tax,rate:r};
}
function isV(id){return S.tables.find(t=>t.id===id)?.vip||false;}
function sc(){return[...S.casts].sort((a,b)=>a.name.localeCompare(b.name,"ja"));}
function rem(e){return e?e-now:null;}
function sbs(ok,msg){const el=document.getElementById("sb");if(!el)return;el.style.color=ok?"#4ade80":"#ff6b6b";el.style.borderColor=ok?"rgba(74,222,128,.2)":"rgba(255,80,80,.2)";el.style.background=ok?"rgba(74,222,128,.06)":"rgba(255,80,80,.06)";el.textContent="⟳ "+msg;}
function iso(i){if(i.isSet)return 0;if(i.isHonShimei)return 1;if(i.isBanaiShimei)return 2;if(i.label==="同伴料")return 3;if(i.id==="freedrink"||i.label==="フリードリンク")return 4;if(i.label==="シングルチャージ")return 5;if(i.isVipCharge)return 6;if(i.isExtension)return 7;if(i.isDiscount)return 11;if(i.id&&i.id.startsWith("cd_"))return 9;return 8;}

function togglePriceHide(){
  priceHidden=!priceHidden;
  const btn=document.getElementById("price-toggle");
  if(btn){btn.textContent=priceHidden?"¥非表示":"¥表示";btn.style.color=priceHidden?"#ff6b6b":"#888";btn.style.borderColor=priceHidden?"rgba(255,80,80,.3)":"rgba(255,255,255,.1)";}

function initFB(){
  const db=window._db;
  sbs(false,"接続中…");
  db.ref("pos").on("value",(snap)=>{
    if(writing)return;
    const d=snap.val();if(!d){sbs(true,"同期済み ✓");render();return;}
    if(d.casts)S.casts=d.casts;if(d.menus)S.menus=d.menus;
    if(d.tables)S.tables=d.tables;if(d.sessions)S.sessions=d.sessions;
    if(d.history)S.history=d.history;
    sbs(true,"同期済み ✓");render();
  },(e)=>sbs(false,"接続エラー"));
}
async function save(path,val){
  if(!window._db)return;writing=true;
  try{await window._db.ref("pos/"+path).set(val);sbs(true,"同期済み ✓");}
  catch(e){sbs(false,"保存エラー");}
  writing=false;
}

function startSession(){
  const{guests,setMenu,honShimeis,douhan,freedrink,single}=ci;
  if(!setMenu)return;
  const items=[];
  const sm=S.menus.sets.find(s=>s.id===setMenu);
  if(sm)items.push({id:sm.id,label:sm.label,price:sm.price,qty:guests,minutes:sm.minutes,isSet:true});
  honShimeis.forEach(cid=>{const c=S.casts.find(c=>c.id===cid);items.push({id:"hs_"+cid,label:"本指名料 ("+c?.name+")",price:3000,qty:1,castId:cid,isHonShimei:true});});
  if(douhan)items.push({id:"dh",label:"同伴料",price:3000,qty:1});
  if(freedrink)items.push({id:"fd",label:"フリードリンク",price:2000,qty:guests});
  if(single)items.push({id:"sc",label:"シングルチャージ",price:2000,qty:guests});
  let st=Date.now();
  if(etv){const[h,m]=etv.split(":").map(Number);const d=new Date();d.setHours(h,m,0,0);st=d.getTime();}
  const si=items.find(i=>i.isSet);
  S.sessions[at]={tableId:at,startTime:st,guests,items,setEndTime:si?st+si.minutes*60000:null,honShimeis,banaiShimeis:[]};
  save("sessions",S.sessions);
  vw="order";ci={guests:1,setMenu:null,honShimeis:[],douhan:false,freedrink:false,single:false};etv="";render();
}

}

  save("sessions",S.sessions);render();
}
function applyET(){
  if(!etv){closeM();return;}
  const[h,m]=etv.split(":").map(Number);const d=new Date();d.setHours(h,m,0,0);const ns=d.getTime();
  const s=S.sessions[at];const df=ns-s.startTime;
  s.startTime=ns;if(s.setEndTime)s.setEndTime+=df;if(s.vipEndTime)s.vipEndTime+=df;
  save("sessions",S.sessions);closeM();render();
}
function remItem(id){
  const s=S.sessions[at];const t=s.items.find(i=>i.id===id);if(!t)return;
  if(t.isExtension&&t.groupId){
    const ei=s.items.find(i=>i.groupId===t.groupId&&i.extMinutes);
    const mn=ei?ei.extMinutes:0;
    s.items=s.items.filter(i=>i.groupId!==t.groupId);
    if(s.setEndTime&&mn>0)s.setEndTime-=mn*60000;
  }else{s.items=s.items.filter(i=>i.id!==id);}
  save("sessions",S.sessions);render();
}

  save("sessions",S.sessions);cp="";cl="";closeM();render();
}
function addDiscount(id){
  const d=(S.menus.discounts||[]).find(x=>x.id===id);if(!d)return;
  const s=S.sessions[at];const{subtotal}=ct(s);
  let amt=0;
  if(d.type==="percent")amt=Math.floor(subtotal*d.value/100);
  else amt=Math.min(d.value||d.price||0,subtotal);
  if(amt<=0)return;
  s.items=[...s.items,{id:"disc_"+Date.now(),label:d.label,price:-amt,qty:1,isDiscount:true}];
  save("sessions",S.sessions);closeM();render();

  save("sessions",S.sessions);closeM();render();
}

  save("history",S.history);save("sessions",S.sessions);

function rFloor(){
  let html='<div style="margin-bottom:16px;display:flex;align-items:center;gap:12px;"><span style="font-size:11px;color:#888;letter-spacing:.1em;">FLOOR MAP</span></div>';
  html+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;">';
  S.tables.forEach(t=>{
    const s=S.sessions[t.id];const rv=rem(s?.setEndTime);const vr=rem(s?.vipEndTime);
    const urg=rv!==null&&rv<600000&&rv>0;const exp=rv!==null&&rv<=0;
    const hn=(s?.honShimeis||[]).map(id=>S.casts.find(c=>c.id===id)?.name).filter(Boolean);
    const bn=(s?.items||[]).filter(i=>i.isBanaiShimei).map(i=>S.casts.find(c=>c.id===i.castId)?.name).filter(Boolean);
    const hv=s?.items.some(i=>i.isVipCharge);
    let inn=s?
      '<div style="font-size:12px;color:#999;margin-bottom:4px;">'
      +new Date(s.startTime).toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"})
      +(s.setEndTime?' <span style="color:'+(urg?"#ff8c00":exp?"#ff4444":"#b8960c")+'">→ '+new Date(s.setEndTime).toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"})+'</span>':"")
      +' · '+s.guests+'名</div>'
      +((hn.length||bn.length)?'<div style="font-size:11px;color:#d4a017;margin-bottom:3px;">'+hn.map(n=>"♛ "+n).join(" ")+(bn.length?' <span style="color:#4ade80">'+bn.map(n=>"☆ "+n).join(" ")+'</span>':"")+' </div>':"")
      +'<div style="font-size:13px;font-weight:600;color:'+(exp?"#ff4444":urg?"#ff6b6b":"#d4a017")+'" class="'+(urg||exp?"urg":"")+'">'+( rv===null?"—":exp?"- "+ts(-rv):"残 "+ts(rv))+'</div>'
      +(hv&&vr!==null?'<div style="font-size:11px;color:#a78bfa;margin-top:2px;">VIP残 '+ts(Math.max(0,vr))+'</div>':"")
      +'<div style="font-size:12px;color:#888;margin-top:4px;">'+pAmt(ct(s).total)+'</div>'
    :'<div style="font-size:12px;color:#444;margin-top:8px;">空席</div>';
    html+='<div class="tc '+(s?"ta":"te")+' '+(isV(t.id)?"tv":"")+ ' sm" data-tid="'+t.id+'" onclick="tc2(this.dataset.tid)">'
      +'<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">'
      +'<span style="font-size:14px;font-weight:500;">'+t.label+'</span>'
      +'<div style="display:flex;gap:4px;">'+(isV(t.id)?'<span class="tag tv2">VIP</span>':"")+(s?'<span class="tag ta2">使用中</span>':"")+'</div>'
      +'</div>'+inn+'</div>';
  });
  html+='</div>';
  return html;
}

// ===== HISTORY =====
function rHist(){
  let html='<div style="max-width:720px;margin:0 auto;">';
  html+='<h2 style="font-family:Cormorant Garamond,serif;font-size:22px;color:#d4a017;margin-bottom:16px;">会計履歴</h2>';
  html+='<div class="glass" style="border-radius:8px;padding:14px;margin-bottom:16px;">';
  html+='<div class="st">期間フィルター・エクスポート</div>';
  html+='<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px;">';
  html+='<input type="date" class="ip" style="flex:1;min-width:120px;" value="'+histFilter.from+'" onchange="histFilter.from=this.value;render()" />';
  html+='<input type="time" class="ip" style="width:100px;" value="'+histFilter.fromTime+'" onchange="histFilter.fromTime=this.value;render()" />';
  html+='<span style="color:#555;font-size:12px;">〜</span>';
  html+='<input type="date" class="ip" style="flex:1;min-width:120px;" value="'+histFilter.to+'" onchange="histFilter.to=this.value;render()" />';
  html+='<input type="time" class="ip" style="width:100px;" value="'+histFilter.toTime+'" onchange="histFilter.toTime=this.value;render()" />';
  html+='</div>';
  html+='<div style="display:flex;gap:8px;flex-wrap:wrap;">';
  html+='<button class="btn" onclick="setHistToday()" style="padding:6px 12px;background:rgba(184,150,12,.1);border:1px solid rgba(184,150,12,.2);color:#d4a017;border-radius:4px;font-size:12px;">今日</button>';
  html+='<button class="btn" onclick="clearHistFilter()" style="padding:6px 12px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#888;border-radius:4px;font-size:12px;">クリア</button>';
  html+='<button class="btn" onclick="exportCSV()" style="padding:6px 14px;background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.25);color:#4ade80;border-radius:4px;font-size:12px;font-weight:600;">📊 CSV出力</button>';
  html+='</div></div>';
  const filtered=getFilteredHist();
  if(filtered.length>0){
    const totalAmt=filtered.reduce((a,h)=>a+h.total,0);
    html+='<div class="glass" style="border-radius:8px;padding:12px 16px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;">';
    html+='<span style="font-size:12px;color:#888;">'+filtered.length+'件</span>';
    html+='<span style="font-size:16px;font-weight:700;color:#d4a017;">合計 '+pAmt(totalAmt)+'</span>';
    html+='</div>';
  }
  if(filtered.length===0){html+='<div style="color:#555;font-size:14px;">該当する履歴がありません</div>';}
  else{
    filtered.forEach(h=>{
      const exp=expandedHist[h.id];
      const dur=Math.round((h.endTime-h.startTime)/60000);
      html+='<div class="hist-card">';
      html+='<div class="hist-header" data-hid="'+h.id+'" onclick="toggleHist(parseInt(this.dataset.hid))">';
      html+='<div style="flex:1;">';
      html+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:4px;">';
      html+='<span style="font-weight:600;font-size:15px;">'+h.tableLabel+'</span>';
      html+='<span style="font-size:12px;color:#888;">'+h.guests+'名</span>';
      html+='<span style="font-size:11px;color:#666;">'+dur+'分</span>';
      html+='</div>';
      html+='<div style="font-size:11px;color:#666;">'+new Date(h.startTime).toLocaleString("ja-JP",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"})+' → '+new Date(h.endTime).toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"})+'</div>';
      html+='</div>';
      html+='<div style="display:flex;align-items:center;gap:12px;">';
      html+='<span style="color:#d4a017;font-weight:700;font-size:16px;">'+pAmt(h.total)+'</span>';
      html+='<span style="color:#555;font-size:18px;">'+(exp?"▲":"▼")+'</span>';
      html+='</div></div>';
      if(exp){
        html+='<div class="hist-body">';
        html+='<div style="margin:12px 0;">';
        [...(h.items||[])].sort((a,b)=>iso(a)-iso(b)).forEach(i=>{
          const isDisc=i.isDiscount;
          html+='<div class="ir" style="font-size:13px;"><span style="color:'+(isDisc?"#ff6b6b":"#bbb")+'">'+(i.qty>1?i.label+" × "+i.qty:i.label)+'</span><span style="color:'+(isDisc?"#ff6b6b":"#d4a017")+'">'+(isDisc?"-":"")+pAmt(Math.abs(i.price*(i.qty||1)))+'</span></div>';
        });
        html+='</div>';
        html+='<div style="border-top:1px solid rgba(255,255,255,.08);padding-top:10px;margin-top:4px;">';
        if(h.discount>0){
          html+='<div class="ir" style="font-size:12px;"><span style="color:#888;">小計</span><span>'+pAmt(h.subtotal)+'</span></div>';
          html+='<div class="ir" style="font-size:12px;"><span style="color:#ff6b6b;">割引</span><span style="color:#ff6b6b;">-'+pAmt(h.discount)+'</span></div>';
        }
        html+='<div class="ir" style="font-size:12px;"><span style="color:#888;">tax+SC ('+Math.round((h.rate||.25)*100)+'%)</span><span>'+pAmt(h.tax)+'</span></div>';
        html+='<div class="ir" style="font-size:15px;font-weight:700;"><span>合計</span><span style="color:#d4a017;">'+pAmt(h.total)+'</span></div>';
        html+='</div>';
        html+='<button class="btn" data-dhid="'+h.id+'" onclick="cdh(parseInt(this.dataset.dhid))" style="margin-top:12px;padding:5px 12px;background:rgba(255,80,80,.1);border:1px solid rgba(255,80,80,.2);color:#ff6b6b;border-radius:4px;font-size:12px;">削除</button>';
        html+='</div>';
      }
      html+='</div>';
    });
  }
  html+='</div>';
  return html;
}
function toggleHist(id){expandedHist[id]=!expandedHist[id];render();}
function setHistToday(){
  const t=new Date().toISOString().slice(0,10);
  histFilter.from=t;histFilter.to=t;histFilter.fromTime="00:00";histFilter.toTime="23:59";render();
}
function clearHistFilter(){histFilter={from:"",to:"",fromTime:"00:00",toTime:"23:59"};render();}
function getFilteredHist(){
  return S.history.filter(h=>{
    if(histFilter.from){const from=new Date(histFilter.from+"T"+(histFilter.fromTime||"00:00")).getTime();if(h.startTime<from)return false;}
    if(histFilter.to){const to=new Date(histFilter.to+"T"+(histFilter.toTime||"23:59")+":59").getTime();if(h.startTime>to)return false;}
    return true;
  });
}
function exportCSV(){
  const data=getFilteredHist();
  if(data.length===0){alert("エクスポートするデータがありません");return;}
  const bom="\uFEFF";
  const header=["日時","テーブル","人数","滞在時間(分)","小計","割引","税+SC","合計","明細"].join(",");
  const rows=data.map(h=>{
    const dur=Math.round((h.endTime-h.startTime)/60000);
    const detail=(h.items||[]).map(i=>(i.qty>1?i.label+"×"+i.qty:i.label)+"(¥"+fmt(Math.abs(i.price*(i.qty||1)))+")").join("／");
    return [new Date(h.startTime).toLocaleString("ja-JP"),h.tableLabel||"",h.guests,dur,h.subtotal||0,h.discount||0,h.tax||0,h.total||0,'"'+detail+'"'].join(",");
  });
  const csv=bom+header+"\n"+rows.join("\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download="genesis_"+(histFilter.from||new Date().toISOString().slice(0,10))+".csv";a.click();URL.revokeObjectURL(url);
}

function sst(t){stab=t;render();}
function dc2(id){S.casts=S.casts.filter(c=>c.id!==id);save("casts",S.casts);render();}
function ac2(){if(!ncn.trim())return;S.casts=[...S.casts,{id:Date.now(),name:ncn.trim()}];save("casts",S.casts);ncn="";render();}
function uml(k,id,v){if(v.trim()){S.menus[k]=S.menus[k].map(x=>x.id===id?{...x,label:v.trim()}:x);save("menus",S.menus);}}
function ump(k,id,v){const p=parseInt(v,10);if(p>0){S.menus[k]=S.menus[k].map(x=>x.id===id?x.type==="percent"?{...x,value:p}:{...x,price:p}:x);save("menus",S.menus);}}
function umm(k,id,v){const m=parseInt(v,10);if(m>0){S.menus[k]=S.menus[k].map(x=>x.id===id?{...x,minutes:m}:x);save("menus",S.menus);}}
function dmi(k,id){S.menus[k]=S.menus[k].filter(x=>x.id!==id);save("menus",S.menus);render();}
function snmi(k,f,v){if(!nmi[k])nmi[k]={label:"",price:"",minutes:"",discType:"fixed"};nmi[k][f]=v;}
function ami(k,hm){
  const ni=nmi[k]||{};if(!ni.label||!ni.price)return;
  const p=parseInt(ni.price,10);if(!p)return;
  const isDisc=(k==="discounts");
  let item;
  if(isDisc){const tp=ni.discType||"fixed";item={id:k+"_"+Date.now(),label:ni.label.trim(),type:tp,value:p};if(tp==="fixed")item.price=p;}
  else{item={id:k+"_"+Date.now(),label:ni.label.trim(),price:p};if(hm&&ni.minutes)item.minutes=parseInt(ni.minutes,10);}
  if(!S.menus[k])S.menus[k]=[];
  S.menus[k]=[...S.menus[k],item];
  save("menus",S.menus);nmi[k]={label:"",price:"",minutes:"",discType:"fixed"};render();
}
function utl(id,v){if(v.trim()){S.tables=S.tables.map(t=>t.id===id?{...t,label:v.trim()}:t);save("tables",S.tables);}}
function ttv(id){S.tables=S.tables.map(t=>t.id===id?{...t,vip:!t.vip}:t);save("tables",S.tables);render();}
function dta(id){if(S.sessions[id])return;S.tables=S.tables.filter(t=>t.id!==id);save("tables",S.tables);render();}
function ata(){if(!ntl.trim())return;S.tables=[...S.tables,{id:"t_"+Date.now(),label:ntl.trim(),vip:ntv}];save("tables",S.tables);ntl="";ntv=false;render();}

    let cb="";sc().forEach(c=>{const dn=s.items.some(i=>i.isBanaiShimei&&i.castId===c.id);cb+='<button class="btn" '+(dn?"disabled":"")+' '+(dn?"":"data-cid=\""+c.id+"\" onclick=\"addBanai(parseInt(this.dataset.cid))\"")+' style="padding:12px 8px;background:'+(dn?"rgba(74,222,128,.08)":"rgba(74,222,128,.1)")+';border:1px solid '+(dn?"rgba(74,222,128,.2)":"rgba(74,222,128,.3)")+';color:'+(dn?"#555":"#4ade80")+';border-radius:6px;font-size:14px;text-align:center;cursor:'+(dn?"default":"pointer")+';">'+(dn?"✓ ":"")+c.name+(!dn?'<div style="font-size:10px;color:#4ade8099;margin-top:2px;">¥1,500</div>':"")+' </button>';});
    h='<div class="mo" onclick="closeM()"><div class="mb" onclick="event.stopPropagation()" style="max-width:500px;"><h3 style="margin-bottom:4px;font-size:16px;color:#4ade80;">場内指名</h3><div style="font-size:12px;color:#666;margin-bottom:16px;">タップで追加（¥1,500/名）</div>'+alh+'<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;">'+cb+'</div><button class="btn" onclick="closeM()" style="margin-top:16px;width:100%;padding:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:#888;border-radius:4px;font-size:13px;">閉じる</button></div></div>';
  }
  else if(md==="hsc"){
    let cb="";sc().forEach(c=>{const sel=ci.honShimeis.includes(c.id);cb+='<button class="btn" data-cid="'+c.id+'" onclick="thn(parseInt(this.dataset.cid))" style="padding:14px 8px;background:'+(sel?"rgba(184,150,12,.25)":"rgba(124,77,255,.1)")+';border:1px solid '+(sel?"#b8960c":"rgba(124,77,255,.3)")+';color:'+(sel?"#d4a017":"#a78bfa")+';border-radius:6px;font-size:14px;text-align:center;">'+(sel?"✓ ":"")+c.name+'<div style="font-size:10px;margin-top:2px;opacity:.7;">¥3,000</div></button>';});
    h='<div class="mo" onclick="closeM()"><div class="mb" onclick="event.stopPropagation()" style="max-width:500px;"><h3 style="margin-bottom:4px;font-size:16px;color:#a78bfa;">本指名キャストを選択</h3><div style="font-size:12px;color:#666;margin-bottom:16px;">タップで選択・解除（¥3,000/名）</div><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;max-height:50vh;overflow-y:auto;">'+cb+'</div>'+(ci.honShimeis.length?'<div style="margin-top:12px;padding:8px 12px;background:rgba(184,150,12,.1);border-radius:4px;font-size:12px;color:#d4a017;">合計 ¥'+fmt(3000*ci.honShimeis.length)+'（'+ci.honShimeis.length+'名）</div>':"")+'<button class="btn gbg" onclick="closeM()" style="margin-top:12px;width:100%;padding:11px;font-weight:700;font-size:14px;border-radius:4px;">確定</button></div></div>';
  }
  else if(md==="et"&&s){
    h='<div class="mo" onclick="closeM()"><div class="mb" onclick="event.stopPropagation()" style="max-width:340px;"><h3 style="margin-bottom:16px;font-size:16px;color:#d4a017;">入店時刻を変更</h3><div style="font-size:12px;color:#888;margin-bottom:12px;">現在: '+new Date(s.startTime).toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"})+'</div><input type="time" class="ip" id="eti" value="'+etv+'" oninput="etv=this.value" style="margin-bottom:16px;"/><div style="font-size:11px;color:#666;margin-bottom:16px;">※セット終了予定時刻も自動で更新されます</div><div style="display:flex;gap:10px;"><button class="btn gbg" onclick="applyET()" style="flex:1;padding:10px;font-weight:700;font-size:14px;border-radius:4px;">変更する</button><button class="btn" onclick="closeM()" style="flex:1;padding:10px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#888;border-radius:4px;">キャンセル</button></div></div></div>';
  }
  else if(md==="dh"){
    h='<div class="mo" onclick="closeM()"><div class="mb" onclick="event.stopPropagation()" style="max-width:340px;"><h3 style="margin-bottom:12px;font-size:16px;">この履歴を削除しますか？</h3><p style="font-size:13px;color:#888;margin-bottom:20px;">削除した履歴は元に戻せません。</p><div style="display:flex;gap:10px;"><button class="btn" onclick="doh()" style="flex:1;padding:10px;background:rgba(255,80,80,.15);border:1px solid rgba(255,80,80,.3);color:#ff6b6b;border-radius:4px;font-weight:600;">削除する</button><button class="btn" onclick="closeM()" style="flex:1;padding:10px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#888;border-radius:4px;">キャンセル</button></div></div></div>';

  c.innerHTML=h;
}
