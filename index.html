// ===== DEVICE DETECTION =====
function getDevice(){
  const ua=navigator.userAgent;
  const isIpad=(/iPad/.test(ua))||(/Macintosh/.test(ua)&&'ontouchend' in document);
  const isIphone=/iPhone/.test(ua);
  const isAndroid=/Android/.test(ua);
  const w=window.innerWidth;
  if(isIpad||(w>=768&&w<=1366&&('ontouchend' in document)))return"tablet";
  if(isIphone||isAndroid||w<768)return"mobile";
  return"desktop";
}

// ===== UTILS =====
function fmt(n){return Number(n||0).toLocaleString("ja-JP");}
function ts(ms){const s=Math.max(0,Math.floor(ms/1000));return[Math.floor(s/3600),Math.floor((s%3600)/60),s%60].map(x=>String(x).padStart(2,"0")).join(":");}
function ct(ses){
  if(!ses||!Array.isArray(ses.items))return{subtotal:0,discount:0,tax:0,total:0,rate:.25};
  const items=ses.items.filter(Boolean);
  const r=items.some(i=>i.isVipCharge)?.30:.25;
  const sub=items.filter(i=>!i.isDiscount).reduce((a,i)=>a+(i.price||0)*(i.qty||1),0);
  const discAmt=items.filter(i=>i.isDiscount).reduce((a,i)=>a+Math.abs((i.price||0)*(i.qty||1)),0);
  const afterDisc=Math.max(0,sub-discAmt);
  const rawTax=Math.floor(afterDisc*r);
  const rawTotal=afterDisc+rawTax;
  const total=Math.ceil(rawTotal/1000)*1000;
  const tax=total-afterDisc;
  return{subtotal:sub,discount:discAmt,tax,total,rate:r};
}

function applyPWConfig(config){
  const pwScreen=document.getElementById("pw-screen");
  if(!pwScreen||pwScreen.style.display==="none")return;
  const KEY="genesis_auth";
  if(!config.pwEnabled){
    // パスワード無効 → 強制入室
    sessionStorage.setItem(KEY,"1");
    pwScreen.style.display="none";
    const loading=document.getElementById("loading");

    if(loading)loading.style.display="none";
    if(app)app.style.display="block";
    if(!window._fbInitDone){window._fbInitDone=true;render();initFB();}
  }
}
function initFB(){
  const db=window._db;
  sbs(false,"接続中…");

    if(banner)banner.style.display=connected?"none":"block";
    if(connected){sbs(true,"接続中 ✓");}
    else{sbs(false,"⚠ オフライン");}
  });

  // ===== バックアップノード購読 =====
  db.ref("backup").on("value",(snap)=>{
    S.backups=snap.val()||{};
    if(["admin","backupDetail"].includes(vw))render();
  });

  db.ref("pos").on("value",(snap)=>{
    const d=snap.val();
    if(!d){sbs(true,"同期済み ✓");render();return;}
    if(d.casts)S.casts=d.casts;
    if(d.menus){
      S.menus=d.menus;
      // 酒類カテゴリが未定義の場合は空配列で初期化
      ['champagne','wine','whisky','shochu','brandy'].forEach(k=>{if(!S.menus[k])S.menus[k]=[];});
    }
    if(d.tables)S.tables=d.tables;
    // オーダー中テーブルのitemsは自分のローカル状態を優先（Firebase同期タイミング問題を防ぐ）
    const prevSession=at&&vw==="order"?S.sessions[at]:null;
    S.sessions=d.sessions||{};
    if(prevSession&&at&&S.sessions[at]&&d.sessions&&d.sessions[at]){
      // Firebaseのitemsが古い場合（自分の書き込みが反映前）はローカルを保持
      if((prevSession.items||[]).length>(S.sessions[at].items||[]).length){
        S.sessions[at]=prevSession;
      }
    }
    S.history=d.history||[];
    S.shifts=d.shifts||{};
    S.assignments=d.assignments||{};
    S.bizDays=d.bizDays||{};
    S.activeBizDay=d.activeBizDay||null;
    if(d.config){
      S.config={password:d.config.password||'genesis0127',pwEnabled:d.config.pwEnabled!==false,printerIP:d.config.printerIP||'192.168.150.76',printerPort:d.config.printerPort||8008};
      // キャッシュ更新（次回起動時に使用）
      localStorage.setItem("genesis_pw_cache",S.config.password);
      localStorage.setItem("genesis_pw_enabled_cache",S.config.pwEnabled?"1":"0");
      // パスワード無効化をリアルタイムで反映（他端末からの変更にも対応）
      applyPWConfig(S.config);
    }
    // config未設定時はデフォルト値を維持（S.configはState初期値で設定済み）
    sbs(true,"同期済み ✓");
    // 自分が開いていたテーブルが他端末で会計終了されていたらフロアへ戻す
    if(at&&vw==="order"&&!S.sessions[at]){
      at=null;vw="floor";closeM();render();return;
    }
    // 営業日が終了していたらホームへ
    if(S.activeBizDay===null&&["floor","checkin","order","shifts","history","settings"].includes(vw)){
      vw="home";closeM();render();return;
    }
    if(vw==="order")renderOrderPartial();
    else render();
  },(e)=>sbs(false,"接続エラー"));
}
async function save(path,val){
  if(!window._db)return;
  try{await window._db.ref("pos/"+path).set(val);sbs(true,"同期済み ✓");}
  catch(e){sbs(false,"保存エラー");}
}

function startSession(){
  const{guests,setMenu,honShimeis,douhan,freedrink,single}=ci;
  if(!setMenu)return;
  const items=[];
  const sm=S.menus.sets.find(s=>s.id===setMenu);
  if(sm)items.push({id:sm.id,label:sm.label,price:sm.price,qty:guests,minutes:sm.minutes,isSet:true});
  honShimeis.forEach(cid=>{const c=S.casts.find(c=>c.id===cid);items.push({id:"hs_"+cid,label:"本指名料 ("+c?.name+")",price:3000,qty:1,castId:cid,isHonShimei:true});});
  if(douhan)items.push({id:"dh",label:"同伴料",price:3000,qty:1});
  if(freedrink)items.push({id:"fd",label:"フリードリンク",price:2000,qty:guests});
  if(single)items.push({id:"sc",label:"シングルチャージ",price:2000,qty:guests});
  let st=Date.now();
  if(etv){const[h,m]=etv.split(":").map(Number);const d=new Date();d.setHours(h,m,0,0);st=d.getTime();}
  const si=items.find(i=>i.isSet);
  S.sessions[at]={tableId:at,startTime:st,guests,items,setEndTime:si?st+si.minutes*60000:null,honShimeis,banaiShimeis:[],note:ci.note||""};
  save("sessions",S.sessions);
  vw="order";ci={guests:1,setMenu:null,honShimeis:[],douhan:false,freedrink:false,single:false,note:""};etv=roundHHMM(5);
  render();
}

function applyET(){
  const v=document.getElementById("eti")?.value||etv;
  if(!v){closeM();return;}
  const[h,m]=v.split(":").map(Number);const d=new Date();d.setHours(h,m,0,0);const ns=d.getTime();
  const s=S.sessions[at];const df=ns-s.startTime;
  s.startTime=ns;if(s.setEndTime)s.setEndTime+=df;if(s.vipEndTime)s.vipEndTime+=df;
  etv=v;

}
function remItem(id){
  const s=S.sessions[at];const t=s.items.find(i=>i.id===id);if(!t)return;
  if(t.isExtension&&t.groupId){
    // 延長削除：グループ丸ごと削除＋setEndTime巻き戻し
    const ei=s.items.find(i=>i.groupId===t.groupId&&i.extMinutes);
    const mn=ei?ei.extMinutes:0;
    s.items=(s?.items||[]).filter(i=>i.groupId!==t.groupId);
    if(s.setEndTime&&mn>0)s.setEndTime-=mn*60000;
  }else if(t.isSet){
    // セット削除：addedGuestsがあればその分だけ人数を戻す
    const n=t.addedGuests||0;
    s.items=(s?.items||[]).filter(i=>i.id!==id);
    if(n>0)s.guests=Math.max(1,s.guests-n);
    // セットがなくなった場合はsetEndTimeをクリア
    const hasSet=(s?.items||[]).some(i=>i.isSet);
    if(!hasSet)s.setEndTime=null;
  }else if(t.isHonShimei){
    // 本指名削除：items＋honShimeis両方から除去
    s.items=(s?.items||[]).filter(i=>i.id!==id);
    s.honShimeis=(s.honShimeis||[]).filter(cid=>cid!==t.castId);
  }else if(t.isBanaiShimei){
    // 場内指名削除：items＋banaiShimeis両方から除去
    s.items=(s?.items||[]).filter(i=>i.id!==id);
    s.banaiShimeis=(s.banaiShimeis||[]).filter(cid=>cid!==t.castId);
  }else{
    s.items=(s?.items||[]).filter(i=>i.id!==id);
  }
  save("sessions",S.sessions);
  if(t.isSet)render();else renderOrderPartial();
}

function checkout(){
  document.querySelectorAll(".sp-amt").forEach((el,i)=>{
    if(coState.splits[i])coState.splits[i].amount=parseInt(el.value)||0;
  });
  const s=S.sessions[at];const totals=ct(s);
  const splits=coState.splits&&coState.splits.length>0?coState.splits:null;
  const payMethod=splits?splits[0].method:(coState.payMethod||"cash");
  const receiptIssued=splits?splits.some(sp=>sp.receipt):(coState.receipt||false);
  const checkoutTableId=at; // atリセット前に保存
  const now_co=Date.now();
  const rec={
    id:now_co,
    tableId:checkoutTableId,
    tableLabel:S.tables.find(t=>t.id===checkoutTableId)?.label,
    startTime:s.startTime,
    endTime:now_co,
    guests:s.guests,
    items:s.items,
    payMethod,receiptIssued,
    splits:splits||null,
    ...totals
  };
  const newHistory=[rec,...S.history];
  const newSessions={...S.sessions};
  delete newSessions[checkoutTableId];

  // アサイン自動終了＋待機移行（atリセット前）
  Object.values(S.assignments||{}).forEach(a=>{
    if(a.tableId===checkoutTableId&&!a.endTime){
      a.endTime=now_co;
      const sh=getShiftByCastId(a.castId);
      if(sh){
        if(!sh.statusLog)sh.statusLog=[];
        const last=sh.statusLog.slice(-1)[0];
        if(last&&!last.endTime)last.endTime=now_co;
        sh.statusLog.push({status:"waiting",startTime:now_co,endTime:null});
        sh.status="waiting";
      }
    }
  });

  // 全データを1回だけアトミックにFirebaseへ保存
  S.sessions=newSessions;
  S.history=newHistory;
  if(window._db){
    window._db.ref("pos").update({
      sessions: Object.keys(newSessions).length>0 ? newSessions : null,
      history: newHistory,
      assignments: Object.keys(S.assignments||{}).length>0 ? S.assignments : null,
      shifts: Object.keys(S.shifts||{}).length>0 ? S.shifts : null
    }).then(()=>sbs(true,"同期済み ✓")).catch(()=>sbs(false,"保存エラー"));
  }
  at=null;vw="floor";coState={payMethod:null,receipt:false,splits:[]};closeM();render();
}
function tableChange(newId){
  if(!at||!newId||newId===at)return;
  if(S.sessions[newId]){alert("移動先のテーブルは使用中です");return;}
  S.sessions[newId]={...S.sessions[at],tableId:newId};
  delete S.sessions[at];
  at=newId;
  save("sessions",S.sessions);closeM();render();
}

function buildOrderRows(s){
  let rows="";
  // 入力順（sort不要）でそのまま表示
  [...s.items].forEach(i=>{
    const lb=i.qty>1?i.label+" × "+i.qty:i.label;
    const isDisc=i.isDiscount;
    rows+='<div class="ir" style="min-height:40px;gap:4px;">'
      +'<span style="flex:1;color:'+(isDisc?"#ff6b6b":"#ccc")+';font-size:13px;line-height:1.4;">'+lb+'</span>'
      +'<div style="display:flex;align-items:center;gap:6px;flex-shrink:0;">'
      +'<span style="color:'+(isDisc?"#ff6b6b":"#d4a017")+';font-size:13px;font-weight:600;white-space:nowrap;">'+(isDisc?"-":"")+pAmt(Math.abs(i.price*(i.qty||1)))+'</span>'
      +'<button class="btn" data-iid="'+i.id+'" onclick="remItem(this.dataset.iid)" style="width:28px;height:28px;border-radius:50%;background:rgba(255,80,80,.15);color:#ff6b6b;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;touch-action:manipulation;">×</button>'
      +'</div></div>';
  });
  if(!rows)rows='<div style="font-size:12px;color:#444;padding:10px 0;">注文なし</div>';
  return rows;
}

function buildOrderSummary(s){
  const{subtotal,discount,tax,total,rate}=ct(s);
  const hv=(s?.items||[]).some(i=>i&&i.isVipCharge);
  let h='<div class="ir"><span style="font-size:12px;color:#888;">小計</span><span>'+pAmt(subtotal)+'</span></div>';
  if(discount>0)h+='<div class="ir"><span style="font-size:12px;color:#ff6b6b;">割引</span><span style="color:#ff6b6b;">-'+pAmt(discount)+'</span></div>';
  h+='<div class="ir"><span style="font-size:12px;color:#888;">tax+SC ('+Math.round(rate*100)+'%)'+(hv?" ★VIP":"")+'</span><span>'+pAmt(tax)+'</span></div>';
  h+='<div style="display:flex;justify-content:space-between;align-items:center;padding-top:10px;margin-top:4px;border-top:1px solid rgba(255,255,255,.06);">'
    +'<span style="font-size:14px;font-weight:700;">合計</span>'
    +'<span style="font-size:22px;font-weight:700;color:#d4a017;" id="order-total">'+pAmt(total)+'</span>'
    +'</div>';
  return h;
}

function sv(v,extra){
  // 管理タブは管理モード時のみアクセス可
  if(v==="admin"&&sessionStorage.getItem("genesis_admin")!=="1")return;
  // home・histlog・history・shifts・settings・adminは営業日に関係なく常時アクセス可
  const alwaysOk=["home","histlog","history","shifts","settings","backupDetail","admin"];

function exportDayCSV(dayId){
  const day=S.bizDays[dayId];if(!day)return;
  const hist=day.history||[];
  if(!hist.length){alert("この営業日の売上データがありません");return;}
  const bom="\uFEFF";
  const header=["日時","テーブル","人数","小計","割引","税+SC","合計","支払方法","領収書"].join(",");
  const rows=hist.map(h=>[
    new Date(h.startTime).toLocaleString("ja-JP"),
    h.tableLabel||"",h.guests,
    h.subtotal||0,h.discount||0,h.tax||0,h.total||0,
    h.payMethod==="card"?"カード":"現金",
    h.receiptIssued?"あり":"なし"
  ].join(","));
  const csv=bom+header+"\n"+rows.join("\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download="genesis_"+day.date+".csv";a.click();URL.revokeObjectURL(url);
}

async function startBizDay(dateStr){
  // 他端末が既に営業を開始していた場合はブロック
  if(S.activeBizDay){
    alert("既に「"+S.activeBizDay+"」の営業が進行中です。\n営業終了後に新しい営業を開始してください。");
    closeM();vw="floor";render();return;
  }
  const id=dateStr;
  const day={id,date:dateStr,startedAt:Date.now(),endedAt:null,history:[],shifts:{},assignments:{}};
  S.bizDays[id]=day;
  S.activeBizDay=id;
  // history/shifts/assignmentsをクリア（新営業日）
  S.history=[];S.shifts={};S.assignments={};S.sessions={};
  if(window._db){
    await window._db.ref("pos").update({
      bizDays:S.bizDays,
      activeBizDay:S.activeBizDay,
      history:[],shifts:null,assignments:null,sessions:null
    });
    sbs(true,"同期済み ✓");
  }
  closeM();vw="floor";render();
}

async function endBizDay(){
  const id=S.activeBizDay;if(!id)return;
  const day=S.bizDays[id];if(!day)return;
  day.endedAt=Date.now();
  day.history=[...S.history];
  day.shifts={...S.shifts};
  day.assignments={...S.assignments};
  S.bizDays[id]=day;
  S.activeBizDay=null;
  if(window._db){
    // バックアップ：当営業日データのみ backup/bizDays/{date} に個別保存（蓄積方式）
    // POSのbizDays削除・history削除の影響を受けない独立したデータ
    const daySnap={
      ts:Date.now(),
      date:day.date,
      history:JSON.parse(JSON.stringify(S.history||[])),
      shifts:JSON.parse(JSON.stringify(S.shifts||{})),
      assignments:JSON.parse(JSON.stringify(S.assignments||{})),
      startedAt:day.startedAt||Date.now(),
      endedAt:day.endedAt
    };
    await window._db.ref("backup/bizDays/"+day.date).set(daySnap).catch(e=>console.warn("backup error",e));
    await window._db.ref("pos").update({
      bizDays:S.bizDays,
      activeBizDay:null,
      history:null,shifts:null,assignments:null,sessions:null
    });
    sbs(true,"同期済み ✓");
  }
  S.history=[];S.shifts={};S.assignments={};S.sessions={};
  closeM();vw="home";render();
}

// キャストチップ（ドラッグ可能なカード）
function castChip(castId,castName,zone,assign,elapsed,timerBase){
  const isActive=zone==="active";
  const isWaiting=zone==="waiting";
  const isBreak=zone==="break";
  const col=isActive?(ASSIGN_TYPES[assign?.type]?.col||"#888"):isWaiting?"#4ade80":"#ffa500";
  const sfx=isActive?(TYPE_SFX[assign?.type]||"?"):"";
  const aid=assign?.id||"";
  return '<div draggable="true" '
    +'data-cast-id="'+castId+'" data-cast-name="'+castName+'" data-zone="'+zone+'" data-assign-id="'+aid+'" '
    +'onclick="event.stopPropagation();chipTap(\''+castId+'\',\''+zone+'\',\''+aid+'\')" '
    +'ondragstart="chipDragStart(event,\''+castId+'\',\''+castName+'\',\''+zone+'\',\''+aid+'\')" '
    +'ondragend="chipDragEnd(event)" '
    +'ontouchstart="chipTouchStart(event,\''+castId+'\',\''+castName+'\',\''+zone+'\',\''+aid+'\')" '
    +'ontouchmove="chipTouchMove(event)" '
    +'ontouchend="chipTouchEnd(event)" '
    +'style="display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:7px;margin-bottom:4px;cursor:grab;user-select:none;touch-action:none;'
    +'background:'+(isActive?"rgba(0,0,0,.3)":"isWaiting"?"rgba(74,222,128,.08)":"rgba(255,165,0,.08)")+';'
    +'background:'+(isActive?"rgba(0,0,0,.3)":isWaiting?"rgba(74,222,128,.08)":"rgba(255,165,0,.08)")+';'
    +'border:1px solid '+col+'44;">'
    +'<div style="display:flex;align-items:center;gap:6px;min-width:0;">'
    +(isActive?'<span style="flex-shrink:0;font-size:9px;padding:1px 5px;border:1px solid '+col+';color:'+col+';border-radius:3px;font-weight:700;">'+sfx+'</span>':'')
    +'<span style="font-size:13px;font-weight:700;color:#e8dcc8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+castName+'</span>'
    +'</div>'
    +'<span data-timer="'+timerBase+'" style="font-size:11px;font-family:monospace;color:'+col+';flex-shrink:0;">'+ts(elapsed).slice(3)+'</span>'
    +'</div>';
}

// チップタップ（クリック）時の処理
function chipTap(castId,zone,assignId){
  if(zone==="active"&&assignId){openAssignActionModal(assignId);}
  else{openCastStatusModal(castId);}
}

// ===== ドラッグ&ドロップ（マウス）=====
function chipDragStart(e,castId,castName,zone,assignId){
  _dnd={dragging:true,castId,castName,fromZone:zone,assignId,ghost:null};
  e.dataTransfer.effectAllowed="move";
  e.dataTransfer.setData("text/plain",castId);
  e.currentTarget.style.opacity=".4";
}
function chipDragEnd(e){
  e.currentTarget.style.opacity="";
  // ドロップゾーンのハイライトを全解除
  document.querySelectorAll("[id^='dz-']").forEach(el=>{el.style.background="";el.style.boxShadow="";});
  _dnd.dragging=false;
}
function dzOver(e,zone,tableId){
  e.preventDefault();e.stopPropagation();
  e.dataTransfer.dropEffect="move";
  const el=document.getElementById(zone==="tbl"?"dz-tbl-"+tableId:zone==="waiting"?"dz-waiting":"dz-break");
  if(el){el.style.background=zone==="waiting"?"rgba(74,222,128,.15)":zone==="break"?"rgba(255,165,0,.15)":"rgba(167,139,250,.15)";
    el.style.boxShadow=zone==="waiting"?"0 0 0 2px #4ade8066":zone==="break"?"0 0 0 2px #ffa50066":"0 0 0 2px #a78bfa66";}
}
function dzLeave(zone,tableId){
  const el=document.getElementById(zone==="tbl"?"dz-tbl-"+tableId:zone==="waiting"?"dz-waiting":"dz-break");
  if(el){el.style.background="";el.style.boxShadow="";}
}
function dzDrop(e,zone,tableId){
  e.preventDefault();e.stopPropagation();
  dzLeave(zone,tableId);
  if(!_dnd.dragging||!_dnd.castId)return;
  const {castId,castName,fromZone,assignId}=_dnd;
  _dnd.dragging=false;
  _dndExecute(castId,castName,fromZone,assignId,zone,tableId);
}

// ===== タッチDnD（iPad対応）=====
let _touch={active:false,castId:null,castName:null,fromZone:null,assignId:null,ghost:null};
function chipTouchStart(e,castId,castName,zone,assignId){
  const t=e.touches[0];
  _touch={active:true,castId,castName,fromZone:zone,assignId,ghost:null,startX:t.clientX,startY:t.clientY,moved:false};
  // ゴーストを作成
  const src=e.currentTarget.cloneNode(true);
  src.style.cssText="position:fixed;pointer-events:none;z-index:9999;opacity:.85;width:160px;border-radius:8px;padding:8px 12px;background:#1a1a2e;border:1px solid rgba(212,160,23,.5);color:#e8dcc8;font-size:13px;font-weight:700;transform:scale(1.05);transition:none;left:"+(t.clientX-80)+"px;top:"+(t.clientY-20)+"px;";
  document.body.appendChild(src);
  _touch.ghost=src;
}
function chipTouchMove(e){
  if(!_touch.active)return;
  e.preventDefault();
  const t=e.touches[0];
  if(_touch.ghost){_touch.ghost.style.left=(t.clientX-80)+"px";_touch.ghost.style.top=(t.clientY-20)+"px";}
  _touch.moved=true;
  // ドロップ候補ハイライト
  document.querySelectorAll("[id^='dz-']").forEach(el=>{
    const r=el.getBoundingClientRect();
    const over=t.clientX>=r.left&&t.clientX<=r.right&&t.clientY>=r.top&&t.clientY<=r.bottom;
    el.style.background=over?(el.id.includes("waiting")?"rgba(74,222,128,.15)":el.id.includes("break")?"rgba(255,165,0,.15)":"rgba(167,139,250,.15)"):"";
    el.style.boxShadow=over?(el.id.includes("waiting")?"0 0 0 2px #4ade8066":el.id.includes("break")?"0 0 0 2px #ffa50066":"0 0 0 2px #a78bfa66"):"";
  });
}
function chipTouchEnd(e){
  if(!_touch.active)return;
  if(_touch.ghost){_touch.ghost.remove();_touch.ghost=null;}
  document.querySelectorAll("[id^='dz-']").forEach(el=>{el.style.background="";el.style.boxShadow="";});
  if(!_touch.moved){_touch.active=false;return;} // タップは chipTap で処理
  const t=e.changedTouches[0];
  let zone=null,tableId=null;
  document.querySelectorAll("[id^='dz-']").forEach(el=>{
    const r=el.getBoundingClientRect();
    if(t.clientX>=r.left&&t.clientX<=r.right&&t.clientY>=r.top&&t.clientY<=r.bottom){
      if(el.id==="dz-waiting")zone="waiting";
      else if(el.id==="dz-break")zone="break";
      else if(el.id.startsWith("dz-tbl-")){zone="tbl";tableId=el.id.replace("dz-tbl-","");}
    }
  });
  const {castId,castName,fromZone,assignId}=_touch;
  _touch.active=false;
  if(zone)_dndExecute(castId,castName,fromZone,assignId,zone,tableId);
}

// ===== DnD実行処理 =====
function _dndExecute(castId,castName,fromZone,assignId,toZone,tableId){
  // 同じゾーンへのドロップは無視（ただし待機→同テーブルなど）
  if(fromZone===toZone&&(toZone!=="tbl"||(fromZone==="tbl")))return;
  if(toZone==="waiting"){
    // テーブル or 休憩 → 待機
    if(assignId)endAssign(assignId);
    else if(fromZone==="break")moveToWaiting(castId);
  } else if(toZone==="break"){
    // テーブル or 待機 → 休憩
    if(assignId){endAssign(assignId);}
    moveToBreak(castId);
  } else if(toZone==="tbl"&&tableId){
    // 待機 or 休憩 or テーブル → テーブル
    const tblSession=S.sessions[tableId];
    if(!tblSession)return; // 空席は不可
    if(assignId&&fromZone==="tbl"){
      // テーブル→別テーブル: 一旦終了してからタイプ選択
      endAssign(assignId);
    }
    // タイプ選択モーダルを開く（Nowモード）
    tsukeMd={step:"type",castId,castName,type:null,tableId,time:"",useNow:true};
    md="tsuke";rModal();
  }
}

function setHistToday(){
  const start=getBizDayStart(Date.now());
  const end=getBizDayEnd(Date.now());
  const s=new Date(start);const e=new Date(end);
  histFilter.from=s.toLocaleDateString("sv-SE");

function clearHistFilter(){histFilter={from:"",to:"",fromTime:"00:00",toTime:"23:59"};render();}
function getFilteredHist(){
  // 現在の営業日 + 全過去営業日のhistoryをマージ
  let allHist=Array.isArray(S.history)?[...S.history]:[];
  Object.values(S.bizDays||{}).forEach(day=>{
    if(Array.isArray(day.history))allHist=allHist.concat(day.history);
  });
  // 重複除去（id基準）
  const seen=new Set();
  allHist=allHist.filter(h=>{if(seen.has(h.id))return false;seen.add(h.id);return true;});
  // フィルター適用
  return allHist.filter(h=>{
    if(histFilter.from){const from=new Date(histFilter.from+"T"+(histFilter.fromTime||"00:00")).getTime();if(h.startTime<from)return false;}
    if(histFilter.to){const to=new Date(histFilter.to+"T"+(histFilter.toTime||"23:59")+":59").getTime();if(h.startTime>to)return false;}
    return true;
  }).sort((a,b)=>b.startTime-a.startTime);
}
function exportCSV(){
  const data=getFilteredHist();
  if(data.length===0){alert("エクスポートするデータがありません");return;}
  const bom="\uFEFF";
  const header=["日時","テーブル","人数","滞在時間(分)","小計","割引","税+SC","合計","支払方法","領収書","明細"].join(",");
  const rows=data.map(h=>{
    const dur=Math.round((h.endTime-h.startTime)/60000);
    const detail=(h.items||[]).map(i=>(i.qty>1?i.label+"×"+i.qty:i.label)+"(¥"+fmt(Math.abs(i.price*(i.qty||1)))+")").join("／");
    return[new Date(h.startTime).toLocaleString("ja-JP"),h.tableLabel||"",h.guests,dur,h.subtotal||0,h.discount||0,h.tax||0,h.total||0,h.payMethod==="card"?"カード":"現金",h.receiptIssued?"あり":"なし",'"'+detail+'"'].join(",");
  });
  const csv=bom+header+"\n"+rows.join("\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download="genesis_"+(histFilter.from||new Date().toISOString().slice(0,10))+".csv";a.click();URL.revokeObjectURL(url);
}

function spUpdateAmt(idx,val){
  coState.splits[idx].amount=parseInt(val)||0;
  const s=S.sessions[at];if(!s)return;
  const total=ct(s).total;
  const used=coState.splits.reduce((a,sp)=>a+(sp.amount||0),0);
  const rem=total-used;
  // 残額表示を更新
  const remEl=document.getElementById("sp-remain");
  if(remEl){
    if(rem>0){
      remEl.textContent="残り ¥"+fmt(rem);
      remEl.style.color="#ff6b6b";remEl.style.background="rgba(255,80,80,.08)";remEl.style.border="1px solid rgba(255,80,80,.2)";
    }else if(rem<0){
      remEl.textContent="超過 ¥"+fmt(-rem);
      remEl.style.color="#ff6b6b";remEl.style.background="rgba(255,80,80,.08)";remEl.style.border="1px solid rgba(255,80,80,.2)";
    }else{
      remEl.textContent="✓ 過不足なし";
      remEl.style.color="#4ade80";remEl.style.background="rgba(74,222,128,.08)";remEl.style.border="1px solid rgba(74,222,128,.2)";
    }
  }
  // 確定ボタンの活性/非活性を更新
  const confirmBtn=document.getElementById("sp-confirm-btn");
  if(confirmBtn){
    if(rem===0){
      confirmBtn.disabled=false;
      confirmBtn.textContent="✓ 会計終了を確定する";
      confirmBtn.className="btn gbg";

function saveHistPay(){
  const h=S.history.find(x=>x.id===editPayHid);if(!h)return;
  const splits=[];
  document.querySelectorAll(".editpay-row").forEach(row=>{
    const method=row.dataset.method||"cash";
    const amount=parseInt(row.querySelector(".editpay-amt")?.value||"0")||0;
    const receipt=row.dataset.receipt==="1";
    if(amount>0)splits.push({method,amount,receipt});
  });
  if(splits.length===0)return;
  h.splits=splits;h.payMethod=splits[0].method;h.receiptIssued=splits.some(sp=>sp.receipt);
  save("history",S.history);editPayHid=null;closeM();render();

// ===== 営業日（20:00〜翌3:00）=====
function getBizDayStart(t){
  const d=new Date(t||Date.now());
  if(d.getHours()<3)d.setDate(d.getDate()-1);
  d.setHours(20,0,0,0);return d.getTime();
}
function getBizDayEnd(t){
  const s=new Date(getBizDayStart(t));
  s.setDate(s.getDate()+1);s.setHours(3,0,0,0);return s.getTime();
}

function clearAllAssignments(){
  if(!confirm("全ての付け回しデータをクリアし、全キャストを待機状態に戻します。\n出勤データは変更されません。\n\nよろしいですか？"))return;
  // assignments全クリア
  S.assignments={};
  // 全キャストのstatusをwaitingに戻す（shiftsは保持・statusLogは保持）
  const now_r=Date.now();
  Object.values(S.shifts||{}).forEach(sh=>{
    if(!sh.clockOut){ // 出勤中のみ
      sh.status="waiting";
      // 現在進行中のstatusLogエントリを閉じて新しいwaitingを追加
      if(!sh.statusLog)sh.statusLog=[];
      const last=sh.statusLog[sh.statusLog.length-1];
      if(last&&!last.endTime)last.endTime=now_r;
      sh.statusLog.push({status:"waiting",startTime:now_r,endTime:null});
    }
  });
  if(window._db){
    window._db.ref("pos").update({
      assignments:null,
      shifts:Object.keys(S.shifts||{}).length>0?S.shifts:null
    }).then(()=>sbs(true,"リセット済み ✓")).catch(()=>sbs(false,"リセットエラー"));
  }
  vw="list";render();
}

async function testPrintXML(ip){
  const port=S.config.printerPort||443;
  const now2=new Date();
  const xml='<text lang="ja" smooth="true"/>'
    +'<text dh="true" dw="true" align="center"/>'+`<text>CLUB GENESIS\n</text>`
    +'<text dh="false" dw="false"/>'+`<text align="center">テスト印刷\n</text>`
    +`<feed line="1"/>`
    +`<text align="left">IP: ${ip}\n</text>`
    +`<text>日時: ${now2.toLocaleString("ja-JP")}\n</text>`
    +`<text>接続: 正常\n</text>`
    +`<feed line="3"/>`
    +`<cut type="feed"/>`;
  const url="https://"+ip+":"+port+"/cgi-bin/epos/service.cgi?devid=local_printer&timeout=10000";
  const soap='<?xml version="1.0" encoding="utf-8"?><s:Envelope xmlns:s="http://schemas.xmlsoap.org/soap/envelope/"><s:Body><epos-print xmlns="http://www.epson-pos.com/schemas/2011/03/epos-print">'+xml+'</epos-print></s:Body></s:Envelope>';
  try{
    const res=await fetch(url,{method:"POST",headers:{"Content-Type":"text/xml; charset=utf-8","SOAPAction":""},body:soap});
    if(!res.ok)throw new Error("HTTP "+res.status);
    sbs(true,"テスト印刷成功 ✓");
    alert("テスト印刷成功！プリンターから出力されました。");
  }catch(e){
    alert("接続失敗: "+e.message+"\n\nIP: "+ip+"\nポート: "+port+"\n\n確認事項:\n・プリンターの電源ON\n・同じWi-Fiに接続\n・Safariで https://"+ip+":"+port+" を一度開いて信頼済みにする");
  }
}

// ePOS SDK → ePOS-Print XML API → ブラウザprint の順でフォールバック
function eposPrint(data, isEstimate){
  const ip=S.config.printerIP||'192.168.150.76';
  const port=S.config.printerPort||8008;
  if(!ip){alert("プリンターIPアドレスが設定されていません。\n管理タブ→プリンター設定から設定してください。");return;}
  if(typeof window.epson!=="undefined"&&!window._eposFailed){
    eposPrintSDK(ip,port,data,isEstimate);
  }else{
    // SDK未ロード → ePOS-Print XML API直接送信
    eposPrintXML(ip,data,isEstimate);
  }
}

// ePOS SDK方式（epos-2.27.0.jsが読み込まれている場合）
function eposPrintSDK(ip,port,data,isEstimate){
  const ePosDev=new window.epson.ePOSDevice();
  ePosDev.connect(ip,port,(result)=>{
    if(result!=="OK"&&result!=="SSL_CONNECT_OK"){
      alert("プリンター接続エラー: "+result+"\nIP: "+ip+"\n\nXML方式で再試行します...");
      eposPrintXML(ip,data,isEstimate);
      return;
    }
    ePosDev.createDevice("local_printer",ePosDev.DEVICE_TYPE_PRINTER,{crypto:false,buffer:false},(prn,retcode)=>{
      if(retcode!=="OK"){alert("デバイス取得エラー: "+retcode);ePosDev.disconnect();return;}
      buildEposCommands(prn,data,isEstimate);
      prn.send();
      prn.onreceive=function(res){ePosDev.deleteDevice(prn,()=>ePosDev.disconnect());if(res.success)sbs(true,"印刷完了 ✓");};
      prn.onerror=function(err){console.error("ePOS error:",err);ePosDev.disconnect();};
    });
  });
}

// ePOS-Print XML API方式（SDK不要・直接HTTPS POST）
async function eposPrintXML(ip,data,isEstimate){
  const port=S.config.printerPort||443;
  const xml=buildEposXML(data,isEstimate);
  const url="https://"+ip+":"+port+"/cgi-bin/epos/service.cgi?devid=local_printer&timeout=10000";
  const soap='<?xml version="1.0" encoding="utf-8"?><s:Envelope xmlns:s="http://schemas.xmlsoap.org/soap/envelope/"><s:Body><epos-print xmlns="http://www.epson-pos.com/schemas/2011/03/epos-print">'+xml+'</epos-print></s:Body></s:Envelope>';
  try{
    const res=await fetch(url,{method:"POST",headers:{"Content-Type":"text/xml; charset=utf-8","SOAPAction":""},body:soap});
    if(!res.ok)throw new Error("HTTP "+res.status);
    sbs(true,"印刷しました ✓");
  }catch(e){
    console.warn("ePOS-Print XML送信失敗:",e.message);
    printReceiptFallback(data,isEstimate);
  }
}

// ePOS-Print XML形式でレシートデータを構築（80mm = 約42半角文字幅）
function buildEposXML(data,isEstimate){
  const{tableLabel,guests,items,subtotal,discount,tax,total,rate,payMethod,receiptIssued,splits,startTime}=data;
  const hv=(items||[]).some(i=>i.isVipCharge);
  const now2=new Date();
  const W=42; // 80mm幅（半角換算）
  const DIV="-".repeat(W);
  const DBL="=".repeat(W);
  let x="";
  const esc=(s)=>String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  // 日本語=2幅、半角=1幅として計算
  const sw=(s)=>[...String(s)].reduce((n,c)=>n+(c.charCodeAt(0)>127?2:1),0);
  // 左ラベル・右金額で右揃え（表示幅ベース）
  const row=(label,amt,w=W)=>{
    const sp=Math.max(1,w-sw(label)-sw(amt));
    return esc(label+" ".repeat(sp)+amt)+"\n";
  };
  const ln=(t,al="left")=>{x+=`<text align="${al}">${esc(t)}\n</text>`;};
  // ラベルから末尾の金額表記を除去（例: "キャストDrink (みゆ) 3,000円" → "キャストDrink (みゆ)"）
  const cleanLbl=(lbl)=>String(lbl).replace(/\s*[\d,]+円$/, "");

  x+='<text lang="ja" smooth="true"/>';
  // ヘッダー：CLUB GENESIS を大きく中央
  x+='<feed line="1"/>';
  x+='<text dh="true" dw="true"/>'; ln("CLUB  GENESIS","center");
  x+='<text dh="false" dw="false"/>';
  ln("R  E  C  E  I  P  T","center");
  x+='<feed line="1"/>';
  x+='<text align="left"/>';
  ln(DIV);
  // テーブル・入店時刻
  ln("テーブル: "+tableLabel+"　"+guests+"名様");
  if(startTime){const st=new Date(startTime);ln("入店: "+st.toLocaleString("ja-JP",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"}));}
  // 本指名キャスト名（例: 本指名（めい）（すず））
  const honNames=(items||[]).filter(i=>i.isHonShimei).map(i=>i.label.replace("本指名料 (","").replace(")","").replace("本指名料","").trim()).filter(Boolean);
  if(honNames.length)ln("本指名 "+honNames.map(n=>"（"+n+"）").join(""));
  if(payMethod){const pm=payMethod==="card"?"カード":"現金";ln("お支払い: "+pm+(receiptIssued?" | 領収書:発行":""));}
  if(splits&&splits.length>1)splits.forEach(sp=>{const m=sp.method==="card"?"カード":"現金";x+=`<text>${esc("  "+m+": ¥"+fmt(sp.amount)+(sp.receipt?" [領]":""))}\n</text>`;});
  ln(DIV);
  (items||[]).forEach(i=>{
    const lb=i.qty>1?cleanLbl(i.label)+" ×"+i.qty:cleanLbl(i.label);
    const amt=(i.isDiscount?"-":"")+"¥"+fmt(Math.abs(i.price*(i.qty||1)));
    x+=`<text>${row(lb,amt)}</text>`;
  });
  ln(DIV);
  // 小計・割引・税SC
  x+=`<text>${row("小計","¥"+fmt(subtotal))}</text>`;
  if(discount>0)x+=`<text>${row("割引","-¥"+fmt(discount))}</text>`;
  x+=`<text>${row("税・SC ("+Math.round(rate*100)+"%"+(hv?" VIP":"")+")", "¥"+fmt(tax))}</text>`;
  ln(DBL);
  // 合計：大きく・余白あり
  x+='<feed line="1"/>';
  x+='<text dh="true" dw="true"/>'; x+=`<text>${row("合 計","¥"+fmt(total),Math.floor(W/2))}</text>`;
  x+='<text dh="false" dw="false"/>';
  x+='<feed line="1"/>';
  ln(DBL);
  x+='<feed line="2"/>';
  ln("ご来店ありがとうございました","center");
  ln("またのご来店をお待ちしております","center");
  x+='<feed line="1"/>';
  ln("CLUB GENESIS","center");
  x+='<feed line="4"/>';
  x+='<cut type="feed"/>';
  return x;
}

function buildEposCommands(prn,data,isEstimate){

  const cleanLbl=(lbl)=>String(lbl).replace(/\s*[\d,]+円$/, "");

  prn.addFeedLine(1);

  const honNames=(items||[]).filter(i=>i.isHonShimei).map(i=>i.label.replace("本指名料 (","").replace(")","").replace("本指名料","").trim()).filter(Boolean);
  if(honNames.length)prn.addText("本指名 "+honNames.map(n=>"（"+n+"）").join("")+"\n");
  if(payMethod){const pm=payMethod==="card"?"カード":"現金";prn.addText("お支払い: "+pm+(receiptIssued?" | 領収書:発行":"")+"\n");}

  prn.addText("-".repeat(W)+"\n");

  prn.addFeedLine(1);
  prn.addTextStyle(false,false,true,prn.COLOR_1); prn.addTextSize(2,2);
  prn.addText(row("合 計","¥"+fmt(total),Math.floor(W/2))+"\n");

  prn.addFeedLine(1);
  prn.addText("=".repeat(W)+"\n");
  prn.addFeedLine(2);

// 概算：指定延長分数でのコスト計算
function calcEstForMinutes(s,extraMinutes,useVipExt){
  const extraItems=[];
  if(extraMinutes>0){
    const ext60=S.menus.extensions.find(e=>e.minutes===60);
    const ext30=S.menus.extensions.find(e=>e.minutes===30);
    if(extraMinutes===60&&ext60){
      extraItems.push({id:"est_ext",label:ext60.label,price:ext60.price,qty:s.guests,isExtension:true});
    } else if(extraMinutes===30&&ext30){
      extraItems.push({id:"est_ext",label:ext30.label,price:ext30.price,qty:s.guests,isExtension:true});
    } else {
      const base=ext30||ext60;
      if(base){
        const price=Math.round(base.price*(extraMinutes/base.minutes));
        extraItems.push({id:"est_ext",label:"延長"+extraMinutes+"分",price,qty:s.guests,isExtension:true});
      }
    }
  }
  if(useVipExt&&isV(at)){
    const vip30=S.menus.vip.find(v=>v.id==="v30");
    if(vip30&&extraMinutes>0){
      // 30分単位で積算（60分なら15,000×2=30,000円）
      const units=Math.ceil(extraMinutes/30);
      extraItems.push({id:"est_vip",label:vip30.label,price:vip30.price,qty:units,isVipCharge:true});
    }
  }
  // SC加算：入店時にSCあり かつ 追加セットなし（1名のまま）の場合のみ
  const hasSC=(s?.items||[]).some(i=>i.label&&i.label.includes("シングルチャージ")&&!i.isExtension);
  const hasAddedGuests=(s?.items||[]).some(i=>i.isSet&&(i.addedGuests||0)>0);
  if(hasSC&&!hasAddedGuests&&extraMinutes>0){
    const scOpt=S.menus.options.find(o=>o.id==="sc");
    const scPrice=scOpt?scOpt.price:2000;
    extraItems.push({id:"est_sc",label:"シングルチャージ（延長）",price:scPrice,qty:1});
  }
  const fake={...s,items:[...s.items,...extraItems.map((x,i)=>({...x,id:"estx_"+i}))]};
  return{...ct(fake),extraItems,extraMinutes,useVipExt};
}

function calcEst(){
  const s=S.sessions[at];if(!s)return{total:0,extraItems:[]};
  const useVip=document.getElementById("est-vip")?.checked||false;
  return calcEstForMinutes(s,estCustomMin||0,useVip);
}

const ASSIGN_TYPES={hon:{label:"本指名",col:"#ff4444"},free:{label:"フリー",col:"#38bdf8"},help:{label:"ヘルプ",col:"#e8dcc8"},banai:{label:"場内指名",col:"#4ade80"}};

function nowHHMM(){const d=new Date();return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");}
function roundHHMM(stepMin){
  const d=new Date();
  const total=d.getHours()*60+d.getMinutes();
  const rounded=Math.round(total/stepMin)*stepMin;
  const h=Math.floor(rounded/60)%24;const m=rounded%60;
  return String(h).padStart(2,"0")+":"+String(m).padStart(2,"0");
}
function adjustHHMM(hhmm,deltaMins){
  // HH:MM を deltaMins 分増減して返す
  if(!hhmm||!hhmm.includes(":"))hhmm=roundHHMM(1);
  const [h,m]=hhmm.split(":").map(Number);
  let total=h*60+m+deltaMins;
  total=((total%1440)+1440)%1440; // 24時間循環
  return String(Math.floor(total/60)).padStart(2,"0")+":"+String(total%60).padStart(2,"0");
}
function hhmm2ts(hhmm){
  // HH:MM を現在の営業日内のtimestampに変換
  // 営業時間: 前日20:00〜翌3:00
  if(!hhmm||!hhmm.includes(":"))return Date.now();
  const[h,m]=hhmm.split(":").map(Number);
  const bizStart=new Date(getBizDayStart(Date.now())); // 当営業日の20:00
  const d=new Date(bizStart);
  if(h>=20){
    // 20:00〜23:59 → 営業日開始日（bizStartと同日）
    d.setHours(h,m,0,0);
  } else {
    // 0:00〜19:59 → 翌日（bizStart+1日）
    d.setDate(d.getDate()+1);
    d.setHours(h,m,0,0);
  }
  return d.getTime();
}
function getOnduty(){
  return Object.values(S.shifts||{}).filter(sh=>!sh.clockOut);
}
function getOndutyIds(){return new Set(getOnduty().map(sh=>sh.castId));}
function getWaitingCasts(){return getOnduty().filter(sh=>(sh.status||"waiting")==="waiting");}
function getBreakCasts(){return getOnduty().filter(sh=>sh.status==="break");}
function getActiveCasts(){return getOnduty().filter(sh=>sh.status==="active");}
function getShiftByCastId(castId){return getOnduty().find(sh=>String(sh.castId)===String(castId));}
function fmtDur(ms){
  const h=Math.floor(ms/3600000);const m=Math.floor((ms%3600000)/60000);
  return h>0?h+"h"+m+"m":m+"m";
}

function clockIn(castId,time){
  const c=S.casts.find(c=>String(c.id)===String(castId));
  if(!c)return;
  const t=hhmm2ts(time||nowHHMM());
  const sid="sh_"+Date.now();
  // statusLogは待機・休憩の開始/終了を記録する配列
  S.shifts[sid]={id:sid,castId:c.id,castName:c.name,clockIn:t,clockOut:null,status:"waiting",statusLog:[{status:"waiting",startTime:t,endTime:null}]};
  save("shifts",S.shifts);closeM();render();
}
function setCastStatus(castId,newStatus){
  const sh=getShiftByCastId(castId);if(!sh)return;
  const now2=Date.now();
  // 現在のstatusLogの最後のエントリを閉じる
  if(!sh.statusLog)sh.statusLog=[];
  const last=sh.statusLog[sh.statusLog.length-1];
  if(last&&!last.endTime)last.endTime=now2;
  // 新しいステータスを追加（activeはログ不要）
  if(newStatus==="waiting"||newStatus==="break"){
    sh.statusLog.push({status:newStatus,startTime:now2,endTime:null});
  }
  sh.status=newStatus;
}
function clockOut(shiftId,time){
  const sh=S.shifts[shiftId];if(!sh)return;
  sh.clockOut=hhmm2ts(time||nowHHMM());
  // 退勤が出勤より前なら翌日扱い
  if(sh.clockOut<=sh.clockIn)sh.clockOut+=86400000;
  save("shifts",S.shifts);closeM();render();
}

function exportShiftCSV(){
  const data=Object.values(S.shifts||{});
  if(!data.length){alert("出勤データがありません");return;}
  const bom="\uFEFF";
  const header=["キャスト名","出勤時刻","退勤時刻","勤務時間"].join(",");
  const rows=data.sort((a,b)=>a.clockIn-b.clockIn).map(sh=>{
    const inT=new Date(sh.clockIn).toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"});
    const outT=sh.clockOut?new Date(sh.clockOut).toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"}):"退勤なし";
    const dur=sh.clockOut?fmtDur(sh.clockOut-sh.clockIn):"";
    return[sh.castName,inT,outT,dur].join(",");
  });
  const csv=bom+header+"\n"+rows.join("\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const bizDate=S.activeBizDay||new Date().toLocaleDateString("sv-SE");
  const a=document.createElement("a");a.href=url;a.download="shift_"+bizDate+".csv";a.click();URL.revokeObjectURL(url);
}

function startAssign(castId,tableId,type,time){
  const c=S.casts.find(c=>String(c.id)===String(castId));
  if(!c){alert("キャストが見つかりません");return;}
  // 既にテーブルについている（active）は付けられない
  const existing=Object.values(S.assignments||{}).find(a=>String(a.castId)===String(castId)&&!a.endTime);
  if(existing){alert(c.name+"は既に"+(S.tables.find(t=>t.id===existing.tableId)?.label||"他テーブル")+"についています");return;}
  const aid="a_"+Date.now();
  // sessionId = そのテーブルの現在セッション開始時刻（会計単位でグループ化に使う）
  const sessionId=S.sessions[tableId]?.startTime||null;
  // attachedAt = 実際に付けた瞬間のtimestamp（カウントアップ基準）
  // startTime = 入力された開始時刻（記録・表示用）
  // 時刻指定モード: attachedAt = startTime（指定時刻からカウントアップ開始）
  const startTs=hhmm2ts(time||nowHHMM());
  const attachedAt=startTs;
  S.assignments[aid]={id:aid,castId:c.id,castName:c.name,tableId,type,startTime:startTs,attachedAt,endTime:null,sessionId};
  const sh=getShiftByCastId(castId);
  if(sh)setCastStatus(castId,"active"); // 休憩中でも付けるとactiveへ
  if(window._db){
    window._db.ref("pos").update({assignments:S.assignments,shifts:S.shifts})
      .then(()=>sbs(true,"同期済み ✓")).catch(()=>sbs(false,"保存エラー"));
  }
  closeM();render();
}

      html+='<span style="color:#bbb;font-weight:600;">'+sh.castName+'</span>';
      html+='<span style="color:#666;margin-left:10px;">'+inT+' → '+outT+'</span>';
      html+='<span style="color:#888;margin-left:8px;">('+fmtDur(worked)+')</span>';
      html+='</div>';
      html+='<div style="display:flex;gap:6px;">';
      html+='<button class="btn" data-sid="'+sh.id+'" onclick="cancelClockOut(this.dataset.sid)" style="padding:4px 10px;background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.2);color:#4ade80;border-radius:4px;font-size:11px;touch-action:manipulation;">退勤取消</button>';
      html+='<button class="btn" data-sid="'+sh.id+'" onclick="editShift(this.dataset.sid)" style="padding:4px 8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:#aaa;border-radius:4px;font-size:11px;touch-action:manipulation;">編集</button>';
      html+='</div>';
      html+='</div>';
    });
    html+='</div>';
  }
  html+='</div>';
  return html;
}

// ===== CLOCK =====
setInterval(()=>{
  now=Date.now();
  const el=document.getElementById("clk");if(el)el.textContent=new Date(now).toLocaleTimeString("ja-JP");
  // モーダル中でもdata-modal-timer属性の要素はカウントアップを更新
  if(md){
    document.querySelectorAll("[data-modal-timer]").forEach(el=>{
      const start=parseInt(el.dataset.modalTimer);
      if(!isNaN(start))el.textContent=ts(Date.now()-start).slice(3);
    });
    return;
  }
  // 全ビューを毎秒再描画（シンプル・確実）
  if(vw==="order")tickOrder();
  else if(["floor","list","tableDetail","assignHistory"].includes(vw))render();
},1000);

function tickOrder(){
  const s=S.sessions[at];if(!s)return;
  const rv=rem(s.setEndTime);const vr=rem(s.vipEndTime);
  const urg=rv!==null&&rv>0&&rv<600000;const ovr=rv!==null&&rv<=0;
  const tc3=ovr?"#ff4444":urg?"#ff8c00":"#d4a017";
  const td=rv===null?"—":ovr?"- "+ts(-rv):ts(rv);
  const timerEl=document.getElementById("order-timer");
  if(timerEl){timerEl.style.color=tc3;timerEl.textContent=td;timerEl.className=(urg||ovr?"urg":"");}
  const vipEl=document.getElementById("order-vip-timer");
  if(vipEl&&vr!==null)vipEl.textContent="VIP残 "+ts(Math.max(0,vr));
}

// ===== 管理モード =====
function toggleAdminMode(){
  const isAdmin=sessionStorage.getItem("genesis_admin")==="1";
  if(isAdmin){
    // OFFにする
    sessionStorage.removeItem("genesis_admin");
    if(vw==="settings"){vw="floor";render();}else render();
  }else{
    // ONにする（アクセスコード入力）
    const code=prompt("管理モードのアクセスコードを入力してください");
    if(code==="gen"){
      sessionStorage.setItem("genesis_admin","1");
      render();
    }else if(code!==null){
      alert("アクセスコードが違います");
    }
  }
}

// ===== BOOT =====
// ===== パスワード認証 =====
(function(){
  const KEY="genesis_auth";
  // 起動時: Firebaseキャッシュ→localStorage→デフォルトの順で参照
  const PW_ENABLED=localStorage.getItem("genesis_pw_enabled_cache")!=="0";
  const PW=localStorage.getItem("genesis_pw_cache")||"genesis0127";
  const pwScreen=document.getElementById("pw-screen");
  const app=document.getElementById("app");
  const loading=document.getElementById("loading");
  if(!PW_ENABLED||sessionStorage.getItem(KEY)==="1"){
    // パスワード無効 or 認証済み：パスワード画面を非表示
    pwScreen.style.display="none";
    if(!PW_ENABLED)sessionStorage.setItem(KEY,"1"); // 無効時は自動認証
  }else{
    // 未認証：アプリとローディングを隠してパスワード画面を表示
    pwScreen.style.display="flex";
    app.style.display="none";
    loading.style.display="none";
  }
  window.checkPW=function(){
    const val=document.getElementById("pw-input").value;
    if(val===PW){
      sessionStorage.setItem(KEY,"1");
      pwScreen.style.display="none";
      loading.style.display="flex";
      // Firebase接続開始
      if(window._fbReady)boot();
      else window.addEventListener("fbReady",boot);
    }else{
      document.getElementById("pw-error").textContent="パスワードが違います";
      document.getElementById("pw-input").value="";
      document.getElementById("pw-input").focus();
    }
  };
})();

function boot(){
  // Firebaseからconfigを先読みしてパスワード状態を最新化
  if(window._db){
    window._db.ref("pos/config").once("value").then(snap=>{
      const cfg=snap.val();
      if(cfg){
        localStorage.setItem("genesis_pw_cache",cfg.password||"genesis0127");
        localStorage.setItem("genesis_pw_enabled_cache",cfg.pwEnabled!==false?"1":"0");
        // パスワード無効なら即入室
        if(cfg.pwEnabled===false){
          sessionStorage.setItem("genesis_auth","1");
          document.getElementById("pw-screen").style.display="none";
        }
      }
    }).catch(()=>{}).finally(()=>{
      document.getElementById("loading").style.display="none";
      document.getElementById("app").style.display="block";
      render();initFB();
    });
  }else{
    document.getElementById("loading").style.display="none";
    document.getElementById("app").style.display="block";
    render();initFB();
  }
}
if(sessionStorage.getItem("genesis_auth")==="1"){
  if(window._fbReady)boot();else{window.addEventListener("fbReady",boot);setTimeout(()=>{if(document.getElementById("loading").style.display!=="none")document.getElementById("lmsg").textContent="接続失敗。再読み込みしてください。";},10000);}
}
