<script>
// ===== DEFAULTS =====
const DC=[{id:1,name:"すず"},{id:2,name:"みお"},{id:3,name:"みゆ"},{id:4,name:"ひなの"},{id:5,name:"れな"},{id:6,name:"まなみ"},{id:7,name:"せりか"},{id:8,name:"あむ"},{id:9,name:"さき"},{id:10,name:"こはる"},{id:11,name:"さり"},{id:12,name:"かのん"},{id:13,name:"かすみ"},{id:14,name:"なな"},{id:15,name:"ゆうか"},{id:16,name:"めぐみ"},{id:17,name:"れみ"},{id:18,name:"ももか"},{id:19,name:"あみ"},{id:20,name:"るな"},{id:21,name:"あゆな"}];
const DM={sets:[{id:"s1",label:"セット料金",price:8000,minutes:60},{id:"s2",label:"案内所特別①",price:5000,minutes:60},{id:"s3",label:"案内所特別②",price:6000,minutes:60},{id:"s4",label:"案内所特別③",price:7000,minutes:60},{id:"s5",label:"同伴セット",price:12000,minutes:90}],options:[{id:"fd",label:"フリードリンク",price:2000},{id:"hs",label:"本指名料",price:3000},{id:"bs",label:"場内指名料",price:1500},{id:"dh",label:"同伴料",price:3000},{id:"sc",label:"シングルチャージ",price:2000}],extensions:[{id:"e30",label:"延長30分",price:4000,minutes:30},{id:"e60",label:"延長60分",price:8000,minutes:60}],vip:[{id:"v60",label:"VIP室料 60分",price:30000,minutes:60},{id:"v30",label:"VIP室料延長 30分",price:15000,minutes:30}],castDrinks:[{id:"cd2",label:"キャストドリンク 2,000円",price:2000},{id:"cd3",label:"キャストドリンク 3,000円",price:3000}],drinks:[{id:"so",label:"ソーダ",price:1000},{id:"pi",label:"ピッチャー",price:1000},{id:"o1",label:"その他 1,000円",price:1000},{id:"o2",label:"その他 2,000円",price:2000},{id:"o3",label:"その他 3,000円",price:3000}],discounts:[{id:"dc10",label:"10%割引",type:"percent",value:10},{id:"dc20",label:"20%割引",type:"percent",value:20},{id:"dc5k",label:"¥5,000割引",type:"fixed",value:5000}]};
const DT=[{id:"t1",label:"テーブル 1",vip:false},{id:"t2",label:"テーブル 2",vip:false},{id:"t3",label:"テーブル 3",vip:false},{id:"t4",label:"テーブル 4",vip:false},{id:"t5",label:"テーブル 5",vip:false},{id:"t6",label:"テーブル 6",vip:false},{id:"t7",label:"テーブル 7",vip:false},{id:"t8",label:"テーブル 8",vip:false},{id:"va",label:"VIP-A",vip:true},{id:"vb",label:"VIP-B",vip:true}];

// ===== STATE =====
let S={casts:DC,menus:DM,tables:DT,sessions:{},history:[]};
let vw="floor",at=null,md=null,cds=0,cdc=null;
let ci={guests:1,setMenu:null,honShimeis:[],douhan:false,freedrink:false,single:false};
let etv="",stab="cast",ncn="",cp="",cl="",dhi=null,qm=null,qv=1,nmi={},ntl="",ntv=false;
let now=Date.now(),writing=false;
let priceHidden=false;
let expandedHist={};
let histFilter={from:"",to:"",fromTime:"00:00",toTime:"23:59"};

// ===== UTILS =====
function fmt(n){return Number(n||0).toLocaleString("ja-JP");}
function ts(ms){const s=Math.max(0,Math.floor(ms/1000));return[Math.floor(s/3600),Math.floor((s%3600)/60),s%60].map(x=>String(x).padStart(2,"0")).join(":");}
function ct(ses){
  if(!ses)return{subtotal:0,discount:0,tax:0,total:0,rate:.25};
  const r=ses.items.some(i=>i.isVipCharge)?.30:.25;
  const sub=ses.items.filter(i=>!i.isDiscount).reduce((a,i)=>a+i.price*(i.qty||1),0);
  const discAmt=ses.items.filter(i=>i.isDiscount).reduce((a,i)=>a+Math.abs(i.price*(i.qty||1)),0);
  const afterDisc=Math.max(0,sub-discAmt);
  const tax=Math.floor(afterDisc*r);
  return{subtotal:sub,discount:discAmt,tax,total:afterDisc+tax,rate:r};
}
function isV(id){return S.tables.find(t=>t.id===id)?.vip||false;}
function sc(){return[...S.casts].sort((a,b)=>a.name.localeCompare(b.name,"ja"));}
function rem(e){return e?e-now:null;}
function sbs(ok,msg){const el=document.getElementById("sb");if(!el)return;el.style.color=ok?"#4ade80":"#ff6b6b";el.style.borderColor=ok?"rgba(74,222,128,.2)":"rgba(255,80,80,.2)";el.style.background=ok?"rgba(74,222,128,.06)":"rgba(255,80,80,.06)";el.textContent="⟳ "+msg;}
function iso(i){if(i.isSet)return 0;if(i.isHonShimei)return 1;if(i.isBanaiShimei)return 2;if(i.label==="同伴料")return 3;if(i.id==="freedrink"||i.label==="フリードリンク")return 4;if(i.label==="シングルチャージ")return 5;if(i.isVipCharge)return 6;if(i.isExtension)return 7;if(i.isDiscount)return 11;if(i.id&&i.id.startsWith("cd_"))return 9;return 8;}

function togglePriceHide(){
  priceHidden=!priceHidden;
  const btn=document.getElementById("price-toggle");
  if(btn){btn.textContent=priceHidden?"¥非表示":"¥表示";btn.style.color=priceHidden?"#ff6b6b":"#888";btn.style.borderColor=priceHidden?"rgba(255,80,80,.3)":"rgba(255,255,255,.1)";}
  render();
}
function pAmt(n){return priceHidden?"¥****":"¥"+fmt(n);}

// ===== FIREBASE =====
let db,fbRef,fbSet,fbOn;
function initFB(){
  db=window._db;fbRef=window._ref;fbSet=window._set;fbOn=window._on;
  sbs(false,"接続中…");
  fbOn(fbRef(db,"pos"),(snap)=>{
    if(writing)return;
    const d=snap.val();if(!d){render();return;}
    if(d.casts)S.casts=d.casts;if(d.menus)S.menus=d.menus;
    if(d.tables)S.tables=d.tables;if(d.sessions)S.sessions=d.sessions;
    if(d.history)S.history=d.history;
    sbs(true,"同期済み ✓");render();
  },()=>sbs(false,"接続エラー"));
}
async function save(path,val){
  if(!db)return;writing=true;
  try{await fbSet(fbRef(db,"pos/"+path),val);sbs(true,"同期済み ✓");}
  catch(e){sbs(false,"保存エラー");}
  writing=false;
}

// ===== SESSIONS =====
function startSession(){
  const{guests,setMenu,honShimeis,douhan,freedrink,single}=ci;
  if(!setMenu)return;
  const items=[];
  const sm=S.menus.sets.find(s=>s.id===setMenu);
  if(sm)items.push({id:sm.id,label:sm.label,price:sm.price,qty:guests,minutes:sm.minutes,isSet:true});
  honShimeis.forEach(cid=>{const c=S.casts.find(c=>c.id===cid);items.push({id:"hs_"+cid,label:"本指名料 ("+c?.name+")",price:3000,qty:1,castId:cid,isHonShimei:true});});
  if(douhan)items.push({id:"dh",label:"同伴料",price:3000,qty:1});
  if(freedrink)items.push({id:"fd",label:"フリードリンク",price:2000,qty:guests});
  if(single)items.push({id:"sc",label:"シングルチャージ",price:2000,qty:guests});
  let st=Date.now();
  if(etv){const[h,m]=etv.split(":").map(Number);const d=new Date();d.setHours(h,m,0,0);st=d.getTime();}
  const si=items.find(i=>i.isSet);
  S.sessions[at]={tableId:at,startTime:st,guests,items,setEndTime:si?st+si.minutes*60000:null,honShimeis,banaiShimeis:[]};
  save("sessions",S.sessions);
  vw="order";ci={guests:1,setMenu:null,honShimeis:[],douhan:false,freedrink:false,single:false};etv="";render();
}
function addExt(ext,wsc){
  const gid="eg_"+Date.now();const s=S.sessions[at];
  const ni=[{id:"e_"+gid,label:ext.label,price:ext.price,qty:s.guests,isExtension:true,extMinutes:ext.minutes,groupId:gid}];
  if(wsc)ni.push({id:"sc_"+gid,label:"シングルチャージ（延長）",price:2000,qty:1,isExtension:true,groupId:gid});
  s.items=[...s.items,...ni];s.setEndTime=(s.setEndTime||Date.now())+ext.minutes*60000;
  save("sessions",S.sessions);closeM();render();
}
function addVip(vip){
  const s=S.sessions[at];
  s.items=[...s.items,{id:vip.id+"_"+Date.now(),label:vip.label,price:vip.price,qty:1,isVipCharge:true}];
  if(vip.id==="v60")s.vipEndTime=Date.now()+vip.minutes*60000;
  else if(vip.id==="v30")s.vipEndTime=(s.vipEndTime||Date.now())+vip.minutes*60000;
  save("sessions",S.sessions);closeM();render();
}
function addBanai(cid){
  const c=S.casts.find(c=>c.id===cid);if(!c)return;
  const s=S.sessions[at];
  if(s.items.some(i=>i.isBanaiShimei&&i.castId===cid))return;
  s.items=[...s.items,{id:"b_"+cid+"_"+Date.now(),label:"場内指名料 ("+c.name+")",price:1500,qty:1,castId:cid,isBanaiShimei:true}];
  s.banaiShimeis=[...(s.banaiShimeis||[]),cid];
  save("sessions",S.sessions);render();
}
function applyET(){
  if(!etv){closeM();return;}
  const[h,m]=etv.split(":").map(Number);const d=new Date();d.setHours(h,m,0,0);const ns=d.getTime();
  const s=S.sessions[at];const df=ns-s.startTime;
  s.startTime=ns;if(s.setEndTime)s.setEndTime+=df;if(s.vipEndTime)s.vipEndTime+=df;
  save("sessions",S.sessions);closeM();render();
}
function remItem(id){
  const s=S.sessions[at];const t=s.items.find(i=>i.id===id);if(!t)return;
  if(t.isExtension&&t.groupId){
    const ei=s.items.find(i=>i.groupId===t.groupId&&i.extMinutes);
    const mn=ei?ei.extMinutes:0;
    s.items=s.items.filter(i=>i.groupId!==t.groupId);
    if(s.setEndTime&&mn>0)s.setEndTime-=mn*60000;
  }else{s.items=s.items.filter(i=>i.id!==id);}
  save("sessions",S.sessions);render();
}
function confQty(){
  if(!qm)return;const qty=Math.max(1,qv);
  const s=S.sessions[at];
  s.items=[...s.items,{id:qm.id+"_"+Date.now(),label:qm.label,price:qm.price,qty}];
  save("sessions",S.sessions);qm=null;qv=1;closeM();render();
}
function addCD(cid,did){
  const c=S.casts.find(c=>c.id===cid);const d=S.menus.castDrinks.find(d=>d.id===did);
  if(!c||!d)return;
  const s=S.sessions[at];
  s.items=[...s.items,{id:"cd_"+Date.now(),label:"キャストDrink ("+c.name+") "+fmt(d.price)+"円",price:d.price,qty:1,castId:cid}];
  save("sessions",S.sessions);closeM();cds=0;cdc=null;render();
}
function addCustom(){
  const p=parseInt(cp,10);if(!p||p<=0)return;
  const s=S.sessions[at];
  s.items=[...s.items,{id:"cu_"+Date.now(),label:cl||"その他",price:p,qty:1}];
  save("sessions",S.sessions);cp="";cl="";closeM();render();
}
function addDiscount(disc){
  const s=S.sessions[at];
  const{subtotal}=ct(s);
  let amt=0;
  if(disc.type==="percent")amt=Math.floor(subtotal*disc.value/100);
  else amt=Math.min(disc.value,subtotal);
  if(amt<=0)return;
  s.items=[...s.items,{id:"disc_"+Date.now(),label:disc.label,price:-amt,qty:1,isDiscount:true}];
  save("sessions",S.sessions);closeM();render();
}
function addCustomDiscount(){
  const el=document.getElementById("disc-custom");if(!el)return;
  const v=parseInt(el.value,10);if(!v||v<=0)return;
  const s=S.sessions[at];
  const{subtotal}=ct(s);
  const amt=Math.min(v,subtotal);
  s.items=[...s.items,{id:"disc_"+Date.now(),label:"割引 -¥"+fmt(amt),price:-amt,qty:1,isDiscount:true}];
  save("sessions",S.sessions);closeM();render();
}
function checkout(){
  const s=S.sessions[at];const totals=ct(s);
  S.history=[{id:Date.now(),tableId:at,tableLabel:S.tables.find(t=>t.id===at)?.label,startTime:s.startTime,endTime:Date.now(),guests:s.guests,items:s.items,...totals},...S.history];
  delete S.sessions[at];
  save("history",S.history);save("sessions",S.sessions);
  at=null;vw="floor";closeM();render();
}

// ===== RENDER =====
function render(){
  updateNav();
  const m=document.getElementById("m");if(!m)return;
  if(vw==="floor")m.innerHTML=rFloor();
  else if(vw==="checkin")m.innerHTML=rCI();
  else if(vw==="order")m.innerHTML=rOrder();
  else if(vw==="history")m.innerHTML=rHist();
  else if(vw==="settings")m.innerHTML=rSettings();
  rModal();
}
function updateNav(){
  [["nf","floor"],["nh","history"],["ns","settings"]].forEach(([id,v])=>{
    const el=document.getElementById(id);if(!el)return;
    el.className="nb"+((v==="floor"&&["floor","order","checkin"].includes(vw))||(v===vw)?" ac":"");
  });
}
function sv(v){vw=v;if(!["order","checkin"].includes(v))at=null;render();}

// FLOOR
function rFloor(){
  return'<div style="margin-bottom:16px;display:flex;align-items:center;gap:12px;"><span style="font-size:11px;color:#888;letter-spacing:.1em;">FLOOR MAP</span><span style="font-size:11px;color:#555;">— 席をタップして操作</span></div>'
  +'<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;">'
  +S.tables.map(t=>{

function setHistToday(){

function clearHistFilter(){histFilter={from:"",to:"",fromTime:"00:00",toTime:"23:59"};render();}
function getFilteredHist(){
  return S.history.filter(h=>{
    if(histFilter.from){
      const from=new Date(histFilter.from+"T"+(histFilter.fromTime||"00:00")).getTime();
      if(h.startTime<from)return false;
    }
    if(histFilter.to){
      const to=new Date(histFilter.to+"T"+(histFilter.toTime||"23:59")+":59").getTime();
      if(h.startTime>to)return false;
    }
    return true;
  });
}

  const bom="\uFEFF";
  const header=["日時","テーブル","人数","滞在時間(分)","小計","割引","税+SC","合計","明細"].join(",");
  const rows=data.map(h=>{
    const dur=Math.round((h.endTime-h.startTime)/60000);
    const detail=(h.items||[]).map(i=>(i.qty>1?i.label+"×"+i.qty:i.label)+"(¥"+fmt(Math.abs(i.price*(i.qty||1)))+")").join("／");
    return [
      new Date(h.startTime).toLocaleString("ja-JP"),
      h.tableLabel||"",
      h.guests,
      dur,
      h.subtotal||0,
      h.discount||0,
      h.tax||0,
      h.total||0,
      '"'+detail+'"'
    ].join(",");
  });
  const csv=bom+header+"\n"+rows.join("\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  const d=histFilter.from||new Date().toISOString().slice(0,10);
  a.download="genesis_"+d+".csv";
  a.click();URL.revokeObjectURL(url);
}

function sst(t){stab=t;render();}
function dc2(id){S.casts=S.casts.filter(c=>c.id!==id);save("casts",S.casts);render();}
function ac2(){if(!ncn.trim())return;S.casts=[...S.casts,{id:Date.now(),name:ncn.trim()}];save("casts",S.casts);ncn="";render();}
function uml(k,id,v){if(v.trim()){S.menus[k]=S.menus[k].map(x=>x.id===id?{...x,label:v.trim()}:x);save("menus",S.menus);}}
function ump(k,id,v){const p=parseInt(v,10);if(p>0){S.menus[k]=S.menus[k].map(x=>x.id===id?x.type==="percent"?{...x,value:p}:{...x,price:p}:x);save("menus",S.menus);}}
function umm(k,id,v){const m=parseInt(v,10);if(m>0){S.menus[k]=S.menus[k].map(x=>x.id===id?{...x,minutes:m}:x);save("menus",S.menus);}}
function dmi(k,id){S.menus[k]=S.menus[k].filter(x=>x.id!==id);save("menus",S.menus);render();}
function snmi(k,f,v){if(!nmi[k])nmi[k]={label:"",price:"",minutes:"",discType:"fixed"};nmi[k][f]=v;}
function ami(k,hm){
  const ni=nmi[k]||{};if(!ni.label||!ni.price)return;
  const p=parseInt(ni.price,10);if(!p)return;
  const isDisc=(k==="discounts");
  let item;
  if(isDisc){
    const tp=ni.discType||"fixed";
    item={id:k+"_"+Date.now(),label:ni.label.trim(),type:tp,value:p};
    if(tp==="fixed")item.price=p;
  }else{
    item={id:k+"_"+Date.now(),label:ni.label.trim(),price:p};
    if(hm&&ni.minutes)item.minutes=parseInt(ni.minutes,10);
  }
  if(!S.menus[k])S.menus[k]=[];
  S.menus[k]=[...S.menus[k],item];
  save("menus",S.menus);nmi[k]={label:"",price:"",minutes:"",discType:"fixed"};render();
}

    h='<div class="mo" onclick="closeM()"><div class="mb" onclick="event.stopPropagation()" style="max-width:500px;"><h3 style="margin-bottom:4px;font-size:16px;color:#4ade80;">場内指名</h3><div style="font-size:12px;color:#666;margin-bottom:16px;">タップで追加（¥1,500/名）</div>'+alh+'<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;">'+cb+'</div><button class="btn" onclick="closeM()" style="margin-top:16px;width:100%;padding:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:#888;border-radius:4px;font-size:13px;">閉じる</button></div></div>';
  }
  else if(md==="hsc"){
    const cb=sc().map(c=>{const sel=ci.honShimeis.includes(c.id);return'<button class="btn" onclick="thn('+c.id+')" style="padding:14px 8px;background:'+(sel?"rgba(184,150,12,.25)":"rgba(124,77,255,.1)")+';border:1px solid '+(sel?"#b8960c":"rgba(124,77,255,.3)")+';color:'+(sel?"#d4a017":"#a78bfa")+';border-radius:6px;font-size:14px;text-align:center;">'+(sel?"✓ ":"")+c.name+'<div style="font-size:10px;margin-top:2px;opacity:.7;">¥3,000</div></button>';}).join("");
    h='<div class="mo" onclick="closeM()"><div class="mb" onclick="event.stopPropagation()" style="max-width:500px;"><h3 style="margin-bottom:4px;font-size:16px;color:#a78bfa;">本指名キャストを選択</h3><div style="font-size:12px;color:#666;margin-bottom:16px;">タップで選択・解除（¥3,000/名）</div><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;max-height:50vh;overflow-y:auto;">'+cb+'</div>'+(ci.honShimeis.length?'<div style="margin-top:12px;padding:8px 12px;background:rgba(184,150,12,.1);border-radius:4px;font-size:12px;color:#d4a017;">合計 ¥'+fmt(3000*ci.honShimeis.length)+'（'+ci.honShimeis.length+'名）</div>':"")+'<button class="btn gbg" onclick="closeM()" style="margin-top:12px;width:100%;padding:11px;font-weight:700;font-size:14px;border-radius:4px;">確定</button></div></div>';
  }
  else if(md==="et"&&s){
    h='<div class="mo" onclick="closeM()"><div class="mb" onclick="event.stopPropagation()" style="max-width:340px;"><h3 style="margin-bottom:16px;font-size:16px;color:#d4a017;">入店時刻を変更</h3><div style="font-size:12px;color:#888;margin-bottom:12px;">現在: '+new Date(s.startTime).toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"})+'</div><input type="time" class="ip" id="eti" value="'+etv+'" oninput="etv=this.value" style="margin-bottom:16px;"/><div style="font-size:11px;color:#666;margin-bottom:16px;">※セット終了予定時刻も自動で更新されます</div><div style="display:flex;gap:10px;"><button class="btn gbg" onclick="applyET()" style="flex:1;padding:10px;font-weight:700;font-size:14px;border-radius:4px;">変更する</button><button class="btn" onclick="closeM()" style="flex:1;padding:10px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#888;border-radius:4px;">キャンセル</button></div></div></div>';
  }
  else if(md==="dh"){
    h='<div class="mo" onclick="closeM()"><div class="mb" onclick="event.stopPropagation()" style="max-width:340px;"><h3 style="margin-bottom:12px;font-size:16px;">この履歴を削除しますか？</h3><p style="font-size:13px;color:#888;margin-bottom:20px;">削除した履歴は元に戻せません。</p><div style="display:flex;gap:10px;"><button class="btn" onclick="doh()" style="flex:1;padding:10px;background:rgba(255,80,80,.15);border:1px solid rgba(255,80,80,.3);color:#ff6b6b;border-radius:4px;font-weight:600;">削除する</button><button class="btn" onclick="closeM()" style="flex:1;padding:10px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#888;border-radius:4px;">キャンセル</button></div></div></div>';
  }
  c.innerHTML=h;
}
function addDiscount(id){
  const d=(S.menus.discounts||[]).find(d=>d.id===id);if(!d)return;
  const s=S.sessions[at];const{subtotal}=ct(s);
  let amt=0;
  if(d.type==="percent")amt=Math.floor(subtotal*d.value/100);
  else amt=Math.min(d.value||d.price,subtotal);
  if(amt<=0)return;
  s.items=[...s.items,{id:"disc_"+Date.now(),label:d.label,price:-amt,qty:1,isDiscount:true}];
  save("sessions",S.sessions);closeM();render();
}
function scc(id){cdc=id;cds=1;rModal();}
function addCDC(){const el=document.getElementById("cdp");const p=parseInt(el?.value,10);if(!p||p<=0)return;const c=S.casts.find(c=>c.id===cdc);const s=S.sessions[at];s.items=[...s.items,{id:"cd_"+Date.now(),label:"キャストDrink ("+c?.name+") "+fmt(p)+"円",price:p,qty:1,castId:cdc}];save("sessions",S.sessions);closeM();cds=0;render();}
function addExt2(id,wsc){const e=S.menus.extensions.find(e=>e.id===id);if(e)addExt(e,wsc);}
function addVip2(id){const v=S.menus.vip.find(v=>v.id===id);if(v)addVip(v);}
function thn(id){ci.honShimeis=ci.honShimeis.includes(id)?ci.honShimeis.filter(x=>x!==id):[...ci.honShimeis,id];rModal();}
function doh(){S.history=S.history.filter(h=>h.id!==dhi);save("history",S.history);dhi=null;closeM();render();}

// CLOCK
setInterval(()=>{now=Date.now();const el=document.getElementById("clk");if(el)el.textContent=new Date(now).toLocaleTimeString("ja-JP");if(["floor","order"].includes(vw))render();},1000);

// PWA Service Worker
if("serviceWorker"in navigator){
  navigator.serviceWorker.register("/sw.js").catch(()=>{});
}

// BOOT
function boot(){document.getElementById("loading").style.display="none";document.getElementById("app").style.display="block";render();initFB();}
if(window._fbReady)boot();else{window.addEventListener("fbReady",boot);setTimeout(()=>{if(document.getElementById("loading").style.display!=="none")document.getElementById("lmsg").textContent="接続失敗。再読み込みしてください。";},10000);}
</script>
