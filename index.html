<script>

const DC=[{id:1,name:"すず"},{id:2,name:"みお"},{id:3,name:"みゆ"},{id:4,name:"ひなの"},{id:5,name:"れな"},{id:6,name:"まなみ"},{id:7,name:"せりか"},{id:8,name:"あむ"},{id:9,name:"さき"},{id:10,name:"こはる"},{id:11,name:"さり"},{id:12,name:"かのん"},{id:13,name:"かすみ"},{id:14,name:"なな"},{id:15,name:"ゆうか"},{id:16,name:"めぐみ"},{id:17,name:"れみ"},{id:18,name:"ももか"},{id:19,name:"あみ"},{id:20,name:"るな"},{id:21,name:"あゆな"}];
const DM={sets:[{id:"s1",label:"セット料金",price:8000,minutes:60},{id:"s2",label:"案内所特別①",price:5000,minutes:60},{id:"s3",label:"案内所特別②",price:6000,minutes:60},{id:"s4",label:"案内所特別③",price:7000,minutes:60},{id:"s5",label:"同伴セット",price:12000,minutes:90}],options:[{id:"fd",label:"フリードリンク",price:2000},{id:"hs",label:"本指名料",price:3000},{id:"bs",label:"場内指名料",price:1500},{id:"dh",label:"同伴料",price:3000},{id:"sc",label:"シングルチャージ",price:2000}],extensions:[{id:"e30",label:"延長30分",price:4000,minutes:30},{id:"e60",label:"延長60分",price:8000,minutes:60}],vip:[{id:"v60",label:"VIP室料 60分",price:30000,minutes:60},{id:"v30",label:"VIP室料延長 30分",price:15000,minutes:30}],castDrinks:[{id:"cd2",label:"キャストドリンク 2,000円",price:2000},{id:"cd3",label:"キャストドリンク 3,000円",price:3000}],drinks:[{id:"so",label:"ソーダ",price:1000},{id:"pi",label:"ピッチャー",price:1000},{id:"o1",label:"その他 1,000円",price:1000},{id:"o2",label:"その他 2,000円",price:2000},{id:"o3",label:"その他 3,000円",price:3000}],discounts:[{id:"dc10",label:"10%割引",type:"percent",value:10},{id:"dc20",label:"20%割引",type:"percent",value:20},{id:"dc5k",label:"¥5,000割引",type:"fixed",value:5000}]};
const DT=[{id:"t1",label:"テーブル 1",vip:false},{id:"t2",label:"テーブル 2",vip:false},{id:"t3",label:"テーブル 3",vip:false},{id:"t4",label:"テーブル 4",vip:false},{id:"t5",label:"テーブル 5",vip:false},{id:"t6",label:"テーブル 6",vip:false},{id:"t7",label:"テーブル 7",vip:false},{id:"t8",label:"テーブル 8",vip:false},{id:"va",label:"VIP-A",vip:true},{id:"vb",label:"VIP-B",vip:true}];

// ===== STATE =====
let S={casts:DC,menus:DM,tables:DT,sessions:{},history:[],shifts:{},assignments:{},bizDays:{},activeBizDay:null};
let vw="home",at=null,md=null,cds=0,cdc=null; // vw初期値をhomeに
let ci={guests:1,setMenu:null,honShimeis:[],douhan:false,freedrink:false,single:false};
let etv="",stab="cast",ncn="",cp="",cl="",dhi=null,qm=null,qv=1,nmi={},ntl="",ntv=false;

let editPayHid=null; // 履歴支払変更対象ID
let estCustomMin=0; // 概算カスタム延長分

// ===== DEVICE DETECTION =====
function getDevice(){
  const ua=navigator.userAgent;
  const isIpad=(/iPad/.test(ua))||(/Macintosh/.test(ua)&&'ontouchend' in document);
  const isIphone=/iPhone/.test(ua);
  const isAndroid=/Android/.test(ua);
  const w=window.innerWidth;
  if(isIpad||(w>=768&&w<=1366&&('ontouchend' in document)))return"tablet";
  if(isIphone||isAndroid||w<768)return"mobile";
  return"desktop";
}
let DEV=getDevice();
window.addEventListener("resize",()=>{DEV=getDevice();});

// ===== UTILS =====
function fmt(n){return Number(n||0).toLocaleString("ja-JP");}
function ts(ms){const s=Math.max(0,Math.floor(ms/1000));return[Math.floor(s/3600),Math.floor((s%3600)/60),s%60].map(x=>String(x).padStart(2,"0")).join(":");}
function ct(ses){
  if(!ses)return{subtotal:0,discount:0,tax:0,total:0,rate:.25};
  const r=ses.items.some(i=>i.isVipCharge)?.30:.25;
  const sub=ses.items.filter(i=>!i.isDiscount).reduce((a,i)=>a+i.price*(i.qty||1),0);
  const discAmt=ses.items.filter(i=>i.isDiscount).reduce((a,i)=>a+Math.abs(i.price*(i.qty||1)),0);
  const afterDisc=Math.max(0,sub-discAmt);
  const rawTax=Math.floor(afterDisc*r);
  const rawTotal=afterDisc+rawTax;
  // 1,000円単位で繰り上げ（繰り上げ分はtaxに含める）
  const total=Math.ceil(rawTotal/1000)*1000;
  const tax=total-afterDisc;
  return{subtotal:sub,discount:discAmt,tax,total,rate:r};
}
function isV(id){return S.tables.find(t=>t.id===id)?.vip||false;}
function sc(){return[...S.casts].sort((a,b)=>a.name.localeCompare(b.name,"ja"));}
function rem(e){return e?e-now:null;}
function sbs(ok,msg){const el=document.getElementById("sb");if(!el)return;el.style.color=ok?"#4ade80":"#ff6b6b";el.style.borderColor=ok?"rgba(74,222,128,.2)":"rgba(255,80,80,.2)";el.style.background=ok?"rgba(74,222,128,.06)":"rgba(255,80,80,.06)";el.textContent="⟳ "+msg;}
function iso(i){if(i.isSet)return 0;if(i.isHonShimei)return 1;if(i.isBanaiShimei)return 2;if(i.label==="同伴料")return 3;if(i.id==="freedrink"||i.label==="フリードリンク")return 4;if(i.label==="シングルチャージ")return 5;if(i.isVipCharge)return 6;if(i.isExtension)return 7;if(i.isDiscount)return 11;if(i.id&&i.id.startsWith("cd_"))return 9;return 8;}
function pAmt(n){return priceHidden?"¥****":"¥"+fmt(n);}
function togglePriceHide(){
  priceHidden=!priceHidden;
  const btn=document.getElementById("price-toggle");
  if(btn){btn.textContent=priceHidden?"¥非表示":"¥表示";btn.style.color=priceHidden?"#ff6b6b":"#888";btn.style.borderColor=priceHidden?"rgba(255,80,80,.3)":"rgba(255,255,255,.1)";}
  render();
}

// ===== FIREBASE =====
function initFB(){
  const db=window._db;
  sbs(false,"接続中…");
  db.ref("pos").on("value",(snap)=>{
    const d=snap.val();
    if(!d){sbs(true,"同期済み ✓");render();return;}
    if(d.casts)S.casts=d.casts;
    if(d.menus)S.menus=d.menus;
    if(d.tables)S.tables=d.tables;
    S.sessions=d.sessions||{};
    S.history=d.history||[];
    S.shifts=d.shifts||{};
    S.assignments=d.assignments||{};
    S.bizDays=d.bizDays||{};
    S.activeBizDay=d.activeBizDay||null;
    sbs(true,"同期済み ✓");
    // 自分が開いていたテーブルが他端末で会計終了されていたらフロアへ戻す
    if(at&&vw==="order"&&!S.sessions[at]){
      at=null;vw="floor";closeM();render();return;
    }
    // 営業日が終了していたらホームへ
    if(S.activeBizDay===null&&["floor","checkin","order","shifts","history","settings"].includes(vw)){
      vw="home";closeM();render();return;
    }
    if(vw==="order")renderOrderPartial();
    else render();
  },(e)=>sbs(false,"接続エラー"));
}
async function save(path,val){
  if(!window._db)return;
  try{await window._db.ref("pos/"+path).set(val);sbs(true,"同期済み ✓");}
  catch(e){sbs(false,"保存エラー");}
}

// ===== SESSIONS =====
function startSession(){
  const{guests,setMenu,honShimeis,douhan,freedrink,single}=ci;
  if(!setMenu)return;
  const items=[];
  const sm=S.menus.sets.find(s=>s.id===setMenu);
  if(sm)items.push({id:sm.id,label:sm.label,price:sm.price,qty:guests,minutes:sm.minutes,isSet:true});
  honShimeis.forEach(cid=>{const c=S.casts.find(c=>c.id===cid);items.push({id:"hs_"+cid,label:"本指名料 ("+c?.name+")",price:3000,qty:1,castId:cid,isHonShimei:true});});
  if(douhan)items.push({id:"dh",label:"同伴料",price:3000,qty:1});
  if(freedrink)items.push({id:"fd",label:"フリードリンク",price:2000,qty:guests});
  if(single)items.push({id:"sc",label:"シングルチャージ",price:2000,qty:guests});
  let st=Date.now();
  if(etv){const[h,m]=etv.split(":").map(Number);const d=new Date();d.setHours(h,m,0,0);st=d.getTime();}
  const si=items.find(i=>i.isSet);
  S.sessions[at]={tableId:at,startTime:st,guests,items,setEndTime:si?st+si.minutes*60000:null,honShimeis,banaiShimeis:[]};
  save("sessions",S.sessions);
  vw="order";ci={guests:1,setMenu:null,honShimeis:[],douhan:false,freedrink:false,single:false};etv="";
  render();
}
function addExt(ext,wsc){
  const gid="eg_"+Date.now();const s=S.sessions[at];
  const ni=[{id:"e_"+gid,label:ext.label,price:ext.price,qty:s.guests,isExtension:true,extMinutes:ext.minutes,groupId:gid}];
  if(wsc)ni.push({id:"sc_"+gid,label:"シングルチャージ（延長）",price:2000,qty:1,isExtension:true,groupId:gid});
  s.items=[...s.items,...ni];s.setEndTime=(s.setEndTime||Date.now())+ext.minutes*60000;
  save("sessions",S.sessions);closeM();renderOrderPartial();
}
function addVip(vip){
  const s=S.sessions[at];
  s.items=[...s.items,{id:vip.id+"_"+Date.now(),label:vip.label,price:vip.price,qty:1,isVipCharge:true}];
  if(vip.id==="v60")s.vipEndTime=Date.now()+vip.minutes*60000;
  else if(vip.id==="v30")s.vipEndTime=(s.vipEndTime||Date.now())+vip.minutes*60000;
  save("sessions",S.sessions);closeM();renderOrderPartial();
}
function addBanai(cid){
  const c=S.casts.find(c=>c.id===cid);if(!c)return;
  const s=S.sessions[at];
  if(s.items.some(i=>i.isBanaiShimei&&i.castId===cid))return;
  s.items=[...s.items,{id:"b_"+cid+"_"+Date.now(),label:"場内指名料 ("+c.name+")",price:1500,qty:1,castId:cid,isBanaiShimei:true}];
  s.banaiShimeis=[...(s.banaiShimeis||[]),cid];
  save("sessions",S.sessions);renderOrderPartial();

function applyET(){

  const[h,m]=v.split(":").map(Number);const d=new Date();d.setHours(h,m,0,0);const ns=d.getTime();
  const s=S.sessions[at];const df=ns-s.startTime;
  s.startTime=ns;if(s.setEndTime)s.setEndTime+=df;if(s.vipEndTime)s.vipEndTime+=df;

function remItem(id){
  const s=S.sessions[at];const t=s.items.find(i=>i.id===id);if(!t)return;
  if(t.isExtension&&t.groupId){
    // 延長削除：グループ丸ごと削除＋setEndTime巻き戻し
    const ei=s.items.find(i=>i.groupId===t.groupId&&i.extMinutes);
    const mn=ei?ei.extMinutes:0;
    s.items=s.items.filter(i=>i.groupId!==t.groupId);
    if(s.setEndTime&&mn>0)s.setEndTime-=mn*60000;
  }else if(t.isSet){
    // セット削除：addedGuestsがあればその分だけ人数を戻す（FD・SCは連動しない）
    const n=t.addedGuests||0;
    s.items=s.items.filter(i=>i.id!==id);
    if(n>0)s.guests=Math.max(1,s.guests-n);
  }else if(t.isHonShimei){
    // 本指名削除：items＋honShimeis両方から除去
    s.items=s.items.filter(i=>i.id!==id);
    s.honShimeis=(s.honShimeis||[]).filter(cid=>cid!==t.castId);
  }else if(t.isBanaiShimei){
    // 場内指名削除：items＋banaiShimeis両方から除去
    s.items=s.items.filter(i=>i.id!==id);
    s.banaiShimeis=(s.banaiShimeis||[]).filter(cid=>cid!==t.castId);
  }else{
    s.items=s.items.filter(i=>i.id!==id);
  }
  save("sessions",S.sessions);
  if(t.isSet)render();else renderOrderPartial();
}

function addSetToSession(setId, addGuests){
  const s=S.sessions[at];if(!s)return;
  const sm=S.menus.sets.find(x=>x.id===setId);if(!sm)return;
  const n=Math.max(1,parseInt(addGuests)||1);
  // 新セット追加（追加人数分）。addedGuests属性で追加人数を記録（削除時に戻すため）
  s.items=[...s.items,{id:sm.id+"_"+Date.now(),label:sm.label,price:sm.price,qty:n,minutes:sm.minutes,isSet:true,addedGuests:n}];

function checkout(){

  document.querySelectorAll(".sp-amt").forEach((el,i)=>{
    if(coState.splits[i])coState.splits[i].amount=parseInt(el.value)||0;
  });
  const s=S.sessions[at];const totals=ct(s);
  const splits=coState.splits&&coState.splits.length>0?coState.splits:null;
  const payMethod=splits?splits[0].method:(coState.payMethod||"cash");
  const receiptIssued=splits?splits.some(sp=>sp.receipt):(coState.receipt||false);
  const rec={
    id:Date.now(),
    tableId:at,
    tableLabel:S.tables.find(t=>t.id===at)?.label,
    startTime:s.startTime,
    endTime:Date.now(),
    guests:s.guests,
    items:s.items,
    payMethod,receiptIssued,
    splits:splits||null,
    ...totals
  };
  const newHistory=[rec,...S.history];
  const newSessions={...S.sessions};
  delete newSessions[at];
  if(window._db){

      history: newHistory
    }).then(()=>sbs(true,"同期済み ✓")).catch(()=>sbs(false,"保存エラー"));

}

function exportDayCSV(dayId){
  const day=S.bizDays[dayId];if(!day)return;
  const hist=day.history||[];
  if(!hist.length){alert("この営業日の売上データがありません");return;}
  const bom="\uFEFF";
  const header=["日時","テーブル","人数","小計","割引","税+SC","合計","支払方法","領収書"].join(",");
  const rows=hist.map(h=>[
    new Date(h.startTime).toLocaleString("ja-JP"),
    h.tableLabel||"",h.guests,
    h.subtotal||0,h.discount||0,h.tax||0,h.total||0,
    h.payMethod==="card"?"カード":"現金",
    h.receiptIssued?"あり":"なし"
  ].join(","));
  const csv=bom+header+"\n"+rows.join("\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download="genesis_"+day.date+".csv";a.click();URL.revokeObjectURL(url);

async function startBizDay(dateStr){
  const id=dateStr;
  const day={id,date:dateStr,startedAt:Date.now(),endedAt:null,history:[],shifts:{},assignments:{}};
  S.bizDays[id]=day;
  S.activeBizDay=id;
  // history/shifts/assignmentsをクリア（新営業日）
  S.history=[];S.shifts={};S.assignments={};S.sessions={};
  if(window._db){
    await window._db.ref("pos").update({
      bizDays:S.bizDays,
      activeBizDay:S.activeBizDay,
      history:[],shifts:null,assignments:null,sessions:null
    });
    sbs(true,"同期済み ✓");
  }
  closeM();vw="floor";render();
}

async function endBizDay(){
  const id=S.activeBizDay;if(!id)return;
  const day=S.bizDays[id];if(!day)return;
  // 現在のデータを営業日に保存
  day.endedAt=Date.now();
  day.history=[...S.history];
  day.shifts={...S.shifts};
  day.assignments={...S.assignments};
  S.bizDays[id]=day;
  S.activeBizDay=null;
  if(window._db){
    await window._db.ref("pos").update({
      bizDays:S.bizDays,
      activeBizDay:null,
      history:null,shifts:null,assignments:null,sessions:null
    });
    sbs(true,"同期済み ✓");
  }
  S.history=[];S.shifts={};S.assignments={};S.sessions={};
  closeM();vw="home";render();
}

function clearHistFilter(){histFilter={from:"",to:"",fromTime:"00:00",toTime:"23:59"};render();}
function getFilteredHist(){
  return S.history.filter(h=>{
    if(histFilter.from){const from=new Date(histFilter.from+"T"+(histFilter.fromTime||"00:00")).getTime();if(h.startTime<from)return false;}
    if(histFilter.to){const to=new Date(histFilter.to+"T"+(histFilter.toTime||"23:59")+":59").getTime();if(h.startTime>to)return false;}
    return true;
  });
}
function exportCSV(){
  const data=getFilteredHist();
  if(data.length===0){alert("エクスポートするデータがありません");return;}
  const bom="\uFEFF";
  const header=["日時","テーブル","人数","滞在時間(分)","小計","割引","税+SC","合計","支払方法","領収書","明細"].join(",");
  const rows=data.map(h=>{
    const dur=Math.round((h.endTime-h.startTime)/60000);
    const detail=(h.items||[]).map(i=>(i.qty>1?i.label+"×"+i.qty:i.label)+"(¥"+fmt(Math.abs(i.price*(i.qty||1)))+")").join("／");
    return[new Date(h.startTime).toLocaleString("ja-JP"),h.tableLabel||"",h.guests,dur,h.subtotal||0,h.discount||0,h.tax||0,h.total||0,h.payMethod==="card"?"カード":"現金",h.receiptIssued?"あり":"なし",'"'+detail+'"'].join(",");
  });
  const csv=bom+header+"\n"+rows.join("\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download="genesis_"+(histFilter.from||new Date().toISOString().slice(0,10))+".csv";a.click();URL.revokeObjectURL(url);
}

// ===== 営業日（20:00〜翌3:00）=====
function getBizDayStart(t){
  const d=new Date(t||Date.now());
  if(d.getHours()<3)d.setDate(d.getDate()-1);
  d.setHours(20,0,0,0);return d.getTime();
}
function getBizDayEnd(t){
  const s=new Date(getBizDayStart(t));
  s.setDate(s.getDate()+1);s.setHours(3,0,0,0);return s.getTime();
}

function clearAllSessions(){
  if(!confirm("進行中のセッションを全て削除します。よろしいですか？"))return;
  S.sessions={};
  if(window._db){
    window._db.ref("pos/sessions").set(null)
      .then(()=>sbs(true,"セッションクリア済み ✓"))
      .catch(()=>sbs(false,"クリアエラー"));
  }
  at=null;vw="floor";render();
}
function sst(t){stab=t;render();}
function udisctype(k,id,v){S.menus[k]=S.menus[k].map(x=>x.id===id?{...x,type:v}:x);save("menus",S.menus);}
function ac2(){if(!ncn.trim())return;S.casts=[...S.casts,{id:Date.now(),name:ncn.trim()}];save("casts",S.casts);ncn="";render();}
function uml(k,id,v){if(v.trim()){S.menus[k]=S.menus[k].map(x=>x.id===id?{...x,label:v.trim()}:x);save("menus",S.menus);}}
function ump(k,id,v){const p=parseInt(v,10);if(p>0){S.menus[k]=S.menus[k].map(x=>x.id===id?x.type==="percent"?{...x,value:p}:{...x,price:p}:x);save("menus",S.menus);}}
function umm(k,id,v){const m=parseInt(v,10);if(m>0){S.menus[k]=S.menus[k].map(x=>x.id===id?{...x,minutes:m}:x);save("menus",S.menus);}}
function dmi(k,id){S.menus[k]=S.menus[k].filter(x=>x.id!==id);save("menus",S.menus);render();}
function snmi(k,f,v){if(!nmi[k])nmi[k]={label:"",price:"",minutes:"",discType:"fixed"};nmi[k][f]=v;}
function ami(k,hm){
  const ni=nmi[k]||{};
  if(!ni.label||ni.label.trim()==="")return;
  if(ni.price===""||ni.price===undefined)return;
  const p=parseInt(ni.price,10);if(isNaN(p)||p<0)return;
  const isDisc=(k==="discounts");
  let item;
  if(isDisc){const tp=ni.discType||"fixed";item={id:k+"_"+Date.now(),label:ni.label.trim(),type:tp,value:p};if(tp==="fixed")item.price=p;}
  else{item={id:k+"_"+Date.now(),label:ni.label.trim(),price:p};if(hm&&ni.minutes)item.minutes=parseInt(ni.minutes,10);}
  if(!S.menus[k])S.menus[k]=[];
  S.menus[k]=[...S.menus[k],item];
  save("menus",S.menus);nmi[k]={label:"",price:"",minutes:"",discType:"fixed"};render();
}
function utl(id,v){if(v.trim()){S.tables=S.tables.map(t=>t.id===id?{...t,label:v.trim()}:t);save("tables",S.tables);}}
function ttv(id){S.tables=S.tables.map(t=>t.id===id?{...t,vip:!t.vip}:t);save("tables",S.tables);render();}
function dta(id){if(S.sessions[id])return;S.tables=S.tables.filter(t=>t.id!==id);save("tables",S.tables);render();}
function ata(){if(!ntl.trim())return;S.tables=[...S.tables,{id:"t_"+Date.now(),label:ntl.trim(),vip:ntv}];save("tables",S.tables);ntl="";ntv=false;render();}

// ===== RECEIPT PRINT =====
function buildReceiptHTML(sessionOrEst, isEstimate){
  // sessionOrEst: {tableLabel, startTime, endTime?, guests, items, subtotal, discount, tax, total, rate, extraItems?}
  const now2=new Date();
  const tl=sessionOrEst.tableLabel||"";
  const st=new Date(sessionOrEst.startTime);
  const et=sessionOrEst.endTime?new Date(sessionOrEst.endTime):now2;
  const dur=Math.round((et-st)/60000);
  const{subtotal,discount,tax,total,rate}=sessionOrEst;
  const hv=(sessionOrEst.items||[]).some(i=>i.isVipCharge);

  let rows="";
  const items=[...(sessionOrEst.items||[])];
  items.forEach(i=>{
    const isDisc=i.isDiscount;
    const lb=i.qty>1?i.label+" ×"+i.qty:i.label;
    if(isDisc){
      rows+='<div class="rcp-row rcp-disc"><span class="rcp-row-label">'+lb+'</span><span class="rcp-row-amt">-¥'+fmt(Math.abs(i.price*(i.qty||1)))+'</span></div>';
    }else{
      rows+='<div class="rcp-row"><span class="rcp-row-label">'+lb+'</span><span class="rcp-row-amt">¥'+fmt(Math.abs(i.price*(i.qty||1)))+'</span></div>';
    }
  });
  // 概算の追加分
  if(isEstimate&&sessionOrEst.extraItems&&sessionOrEst.extraItems.length>0){
    rows+='<div style="font-size:8pt;color:#555;padding:0.5mm 0;border-top:1px dotted #ccc;margin-top:1mm;">【概算追加分】</div>';
    sessionOrEst.extraItems.forEach(i=>{
      const lb=i.qty>1?i.label+" ×"+i.qty:i.label;
      rows+='<div class="rcp-row rcp-disc"><span class="rcp-row-label">'+lb+'</span><span class="rcp-row-amt">¥'+fmt(i.price*(i.qty||1))+'</span></div>';
    });
  }
  // 割引は入力順に表示済みのため後出し処理なし

  return `
<div class="rcp-logo">CLUB GENESIS</div>
<div class="rcp-sub">RECEIPT</div>
<hr class="rcp-divider">
<div class="rcp-meta">テーブル: <strong>${tl}</strong> &nbsp; ${sessionOrEst.guests}名様</div>
<div class="rcp-meta">発行: ${now2.toLocaleString("ja-JP",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"})}</div>
${!isEstimate&&sessionOrEst.payMethod?`<div class="rcp-meta">お支払い: <strong>${sessionOrEst.payMethod==="card"?"カード":"現金"}</strong>${sessionOrEst.receiptIssued?" &nbsp;|&nbsp; 領収書:発行":""}</div>`:""}
<hr class="rcp-divider">
${rows}
<hr class="rcp-divider">
<div class="rcp-subtotal-row"><span>小計</span><span>¥${fmt(subtotal)}</span></div>
${discount>0?`<div class="rcp-subtotal-row"><span>割引</span><span>-¥${fmt(discount)}</span></div>`:""}
<div class="rcp-subtotal-row"><span>税・SC (${Math.round(rate*100)}%${hv?" ★VIP":""})</span><span>¥${fmt(tax)}</span></div>
<hr class="rcp-divider-solid">
<div class="rcp-total-row">
  <span class="rcp-total-label">合 計</span>
  <span class="rcp-total-amt">¥${fmt(total)}</span>
</div>
<hr class="rcp-divider">
<div class="rcp-thanks">
  ご来店ありがとうございました<br>
  またのご来店をお待ちしております<br>
  CLUB GENESIS
</div>`;
}

function printReceipt(data, isEstimate){
  const el=document.getElementById("receipt-print-area");
  if(!el)return;
  el.innerHTML=buildReceiptHTML(data,isEstimate);
  el.style.display="block";
  // iOS Safari対応：少し待ってからprint
  setTimeout(()=>{
    window.print();
    setTimeout(()=>{el.style.display="none";},500);
  },150);
}

}

function printEstimate(){
  const s=S.sessions[at];if(!s)return;
  const tl=S.tables.find(t=>t.id===at)?.label||"";

// 概算：指定延長分数でのコスト計算
function calcEstForMinutes(s,extraMinutes,useVipExt){
  const extraItems=[];
  if(extraMinutes>0){
    const ext60=S.menus.extensions.find(e=>e.minutes===60);
    const ext30=S.menus.extensions.find(e=>e.minutes===30);
    if(extraMinutes===60&&ext60){
      extraItems.push({id:"est_ext",label:ext60.label,price:ext60.price,qty:s.guests,isExtension:true});
    } else if(extraMinutes===30&&ext30){
      extraItems.push({id:"est_ext",label:ext30.label,price:ext30.price,qty:s.guests,isExtension:true});
    } else {
      const base=ext30||ext60;
      if(base){
        const price=Math.round(base.price*(extraMinutes/base.minutes));
        extraItems.push({id:"est_ext",label:"延長"+extraMinutes+"分",price,qty:s.guests,isExtension:true});
      }
    }
  }
  if(useVipExt&&isV(at)){
    const vip30=S.menus.vip.find(v=>v.id==="v30");
    if(vip30&&extraMinutes>0){
      // 30分単位で積算（60分なら15,000×2=30,000円）
      const units=Math.ceil(extraMinutes/30);
      extraItems.push({id:"est_vip",label:vip30.label,price:vip30.price,qty:units,isVipCharge:true});
    }
  }
  // SC加算：入店時にSCあり かつ 追加セットなし（1名のまま）の場合のみ
  const hasSC=s.items.some(i=>i.label&&i.label.includes("シングルチャージ")&&!i.isExtension);
  const hasAddedGuests=s.items.some(i=>i.isSet&&(i.addedGuests||0)>0);
  if(hasSC&&!hasAddedGuests&&extraMinutes>0){
    const scOpt=S.menus.options.find(o=>o.id==="sc");
    const scPrice=scOpt?scOpt.price:2000;
    extraItems.push({id:"est_sc",label:"シングルチャージ（延長）",price:scPrice,qty:1});
  }
  const fake={...s,items:[...s.items,...extraItems.map((x,i)=>({...x,id:"estx_"+i}))]};
  return{...ct(fake),extraItems,extraMinutes,useVipExt};
}

function calcEst(){
  const s=S.sessions[at];if(!s)return{total:0,extraItems:[]};
  const useVip=document.getElementById("est-vip")?.checked||false;
  return calcEstForMinutes(s,estCustomMin||0,useVip);
}

// ===== 出勤・退勤 =====
const ASSIGN_TYPES={hon:{label:"本指名",col:"#d4a017"},help:{label:"ヘルプ",col:"#38bdf8"},douhan:{label:"同伴",col:"#a78bfa"},free:{label:"フリー",col:"#4ade80"}};
let shiftMd={step:"cast",mode:"in",castId:null,shiftId:null,time:""};
let tsukeMd={step:"cast",castId:null,type:null,time:""};

function nowHHMM(){const d=new Date();return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");}
function hhmm2ts(hhmm){
  // HH:MM を当日または翌日のtimestampに変換
  if(!hhmm||!hhmm.includes(":"))return Date.now();
  const[h,m]=hhmm.split(":").map(Number);
  const d=new Date();
  d.setSeconds(0,0);
  d.setHours(h,m,0,0);
  return d.getTime();
}
function getOnduty(){
  return Object.values(S.shifts||{}).filter(sh=>!sh.clockOut);
}
function getOndutyIds(){return new Set(getOnduty().map(sh=>sh.castId));}
function fmtDur(ms){
  const h=Math.floor(ms/3600000);const m=Math.floor((ms%3600000)/60000);
  return h>0?h+"h"+m+"m":m+"m";
}

function clockIn(castId,time){
  const c=S.casts.find(c=>String(c.id)===String(castId));
  if(!c)return;
  const t=hhmm2ts(time||nowHHMM());
  const sid="sh_"+Date.now();
  S.shifts[sid]={id:sid,castId:c.id,castName:c.name,clockIn:t,clockOut:null};
  save("shifts",S.shifts);closeM();render();
}
function clockOut(shiftId,time){
  const sh=S.shifts[shiftId];if(!sh)return;
  sh.clockOut=hhmm2ts(time||nowHHMM());
  // 退勤が出勤より前なら翌日扱い
  if(sh.clockOut<=sh.clockIn)sh.clockOut+=86400000;
  save("shifts",S.shifts);closeM();render();
}
function confirmShiftTime(){
  const el=document.getElementById("shift-time");
  const t=(el&&el.value)?el.value:nowHHMM();
  if(shiftMd.mode==="in"){
    clockIn(shiftMd.castId,t);
  }else{
    clockOut(shiftMd.shiftId,t);
  }
}
function openShiftMd(mode){
  shiftMd={step:"cast",mode,castId:null,shiftId:null,time:nowHHMM()};
  md="shift";rModal();
}
function editShift(sid){
  shiftMd.step="edit";shiftMd.shiftId=sid;md="shift";rModal();
}
function saveShiftEdit(){
  const sh=S.shifts[shiftMd.shiftId];if(!sh)return;
  const inEl=document.getElementById("se-in");
  const outEl=document.getElementById("se-out");
  if(inEl&&inEl.value)sh.clockIn=hhmm2ts(inEl.value);
  if(outEl&&outEl.value){
    sh.clockOut=hhmm2ts(outEl.value);
    if(sh.clockOut<=sh.clockIn)sh.clockOut+=86400000;
  }else{sh.clockOut=null;}
  save("shifts",S.shifts);closeM();render();
}
function deleteShift(sid){
  delete S.shifts[sid];save("shifts",S.shifts);closeM();render();
}
function exportShiftCSV(){
  const data=Object.values(S.shifts||{});
  if(!data.length){alert("出勤データがありません");return;}
  const bom="\uFEFF";
  const header=["キャスト名","出勤時刻","退勤時刻","勤務時間"].join(",");
  const rows=data.sort((a,b)=>a.clockIn-b.clockIn).map(sh=>{
    const inT=new Date(sh.clockIn).toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"});
    const outT=sh.clockOut?new Date(sh.clockOut).toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"}):"退勤なし";
    const dur=sh.clockOut?fmtDur(sh.clockOut-sh.clockIn):"";
    return[sh.castName,inT,outT,dur].join(",");
  });
  const csv=bom+header+"\n"+rows.join("\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const bizDate=S.activeBizDay||new Date().toLocaleDateString("sv-SE");
  const a=document.createElement("a");a.href=url;a.download="shift_"+bizDate+".csv";a.click();URL.revokeObjectURL(url);
}

// ===== 付け回し =====
function startAssign(castId,tableId,type,time){
  const c=S.casts.find(c=>String(c.id)===String(castId));if(!c)return;
  // 同キャストの未終了付け回しがあれば終了
  Object.values(S.assignments||{}).forEach(a=>{
    if(String(a.castId)===String(castId)&&!a.endTime)a.endTime=Date.now();
  });
  const aid="a_"+Date.now();
  S.assignments[aid]={id:aid,castId:c.id,castName:c.name,tableId,type,startTime:hhmm2ts(time||nowHHMM()),endTime:null};
  save("assignments",S.assignments);closeM();render();
}
function endAssign(aid){
  if(S.assignments[aid])S.assignments[aid].endTime=Date.now();
  save("assignments",S.assignments);render();
}
function deleteAssign(aid){
  if(!confirm("削除しますか？"))return;
  delete S.assignments[aid];save("assignments",S.assignments);render();
}

// ===== 出勤画面 =====
function rShifts(){
  const bs=getBizDayStart(Date.now());const be=getBizDayEnd(Date.now());
  const onduty=getOnduty().sort((a,b)=>a.clockIn-b.clockIn);
  const onIds=getOndutyIds();
  const allToday=Object.values(S.shifts||{});
  const done=allToday.filter(sh=>sh.clockOut).sort((a,b)=>b.clockIn-a.clockIn);
  const totalMs=allToday.reduce((a,sh)=>a+((sh.clockOut||Date.now())-sh.clockIn),0);

  let html='<div style="max-width:720px;margin:0 auto;">';
  html+='<h2 style="font-family:Cormorant Garamond,serif;font-size:22px;color:#d4a017;margin-bottom:16px;">出勤管理</h2>';

  // アクションボタン
  html+='<div style="display:flex;gap:10px;margin-bottom:16px;">';
  html+='<button class="btn gbg" onclick="openShiftMd(\'in\')" style="flex:1;padding:14px;font-size:15px;font-weight:700;border-radius:8px;touch-action:manipulation;">🟢 出勤登録</button>';
  html+='<button class="btn" onclick="openShiftMd(\'out\')" style="flex:1;padding:14px;font-size:15px;font-weight:700;border-radius:8px;background:rgba(255,80,80,.12);border:1px solid rgba(255,80,80,.3);color:#ff6b6b;touch-action:manipulation;">🔴 退勤登録</button>';
  html+='<button class="btn" onclick="exportShiftCSV()" style="padding:14px 16px;background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.25);color:#4ade80;border-radius:8px;font-size:13px;font-weight:600;touch-action:manipulation;">📊 CSV</button>';
  html+='</div>';

  // 出勤中
  html+='<div class="glass" style="border-radius:8px;padding:16px;margin-bottom:14px;">';
  html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">';
  html+='<div class="st">出勤中 ('+onduty.length+'名)</div>';
  html+='<div style="font-size:12px;color:#888;">本日累計: <span style="color:#4ade80;font-weight:700;">'+fmtDur(totalMs)+'</span></div>';
  html+='</div>';
  if(!onduty.length){html+='<div style="font-size:13px;color:#444;padding:8px 0;">出勤中のキャストはいません</div>';}
  else onduty.forEach(sh=>{
    const elapsed=Date.now()-sh.clockIn;
    const inT=new Date(sh.clockIn).toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"});
    // このキャストの現在の付け回し
    const curA=Object.values(S.assignments||{}).filter(a=>a.castId===sh.castId&&!a.endTime)[0];
    const tbl=curA?S.tables.find(t=>t.id===curA.tableId)?.label:"待機中";
    const aCol=curA?(ASSIGN_TYPES[curA.type]?.col||"#888"):"#555";
    const aLbl=curA?(ASSIGN_TYPES[curA.type]?.label||curA.type):"待機";
    html+='<div class="ir" style="min-height:48px;">';
    html+='<div style="flex:1;">';
    html+='<span style="font-size:14px;font-weight:700;color:#e8dcc8;">'+sh.castName+'</span>';
    html+='<span style="font-size:11px;color:#888;margin-left:8px;">'+inT+'〜 ('+fmtDur(elapsed)+')</span>';
    html+='<div style="margin-top:3px;"><span style="font-size:11px;padding:2px 7px;background:rgba(0,0,0,.3);border:1px solid '+aCol+';color:'+aCol+';border-radius:3px;">'+aLbl+(curA?" · "+tbl:"")+'</span></div>';
    html+='</div>';
    html+='<div style="display:flex;gap:6px;">';
    html+='<button class="btn" data-sid="'+sh.id+'" onclick="editShift(this.dataset.sid)" style="padding:4px 10px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:#aaa;border-radius:4px;font-size:11px;touch-action:manipulation;">編集</button>';
    html+='</div>';
    html+='</div>';
  });
  html+='</div>';

  // 退勤済み
  if(done.length){
    html+='<div class="glass" style="border-radius:8px;padding:16px;">';
    html+='<div class="st" style="margin-bottom:12px;">退勤済み</div>';
    done.forEach(sh=>{
      const worked=sh.clockOut-sh.clockIn;
      const inT=new Date(sh.clockIn).toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"});
      const outT=new Date(sh.clockOut).toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"});
      html+='<div class="ir" style="font-size:13px;min-height:38px;">';
      html+='<div style="flex:1;">';
      html+='<span style="color:#bbb;font-weight:600;">'+sh.castName+'</span>';
      html+='<span style="color:#666;margin-left:10px;">'+inT+' → '+outT+'</span>';
      html+='<span style="color:#888;margin-left:8px;">('+fmtDur(worked)+')</span>';
      html+='</div>';
      html+='<button class="btn" data-sid="'+sh.id+'" onclick="editShift(this.dataset.sid)" style="padding:4px 8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:#aaa;border-radius:4px;font-size:11px;touch-action:manipulation;">編集</button>';
      html+='</div>';
    });
    html+='</div>';
  }
  html+='</div>';
  return html;
}

  const el=document.getElementById("clk");if(el)el.textContent=new Date(now).toLocaleTimeString("ja-JP");
  if(md)return;
  if(vw==="floor")render();
  else if(vw==="order")tickOrder();

function tickOrder(){
  const s=S.sessions[at];if(!s)return;
  const rv=rem(s.setEndTime);const vr=rem(s.vipEndTime);
  const urg=rv!==null&&rv>0&&rv<600000;const ovr=rv!==null&&rv<=0;
  const tc3=ovr?"#ff4444":urg?"#ff8c00":"#d4a017";
  const td=rv===null?"—":ovr?"- "+ts(-rv):ts(rv);
  const timerEl=document.getElementById("order-timer");
  if(timerEl){timerEl.style.color=tc3;timerEl.textContent=td;timerEl.className=(urg||ovr?"urg":"");}
  const vipEl=document.getElementById("order-vip-timer");
  if(vipEl&&vr!==null)vipEl.textContent="VIP残 "+ts(Math.max(0,vr));
}
